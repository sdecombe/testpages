<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>CB2D (Aztec) – taille fixe, modules exacts (déf. C), calibrage</title>

  <style>
    :root {
      color-scheme: light dark;
      --bg: #0d1117;
      --fg: #e6edf3;
      --panel: #11161c;
      --panel-2: #0b0f14;
      --accent: #3ea6ff;
      --top-bg: #ffffff;      /* fond blanc, moitié supérieure */
      --error-bg: #3b0d0d;    /* rouge sombre si <1 px/module */
      --anchor-cb2d-y: 28vh;  /* centre vertical CB2D (tiers sup.) */
      --anchor-ruler-y: 60vh; /* centre vertical règle */
      --size-cm: 3;           /* taille cible du symbole (1–5 cm) */
    }

    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", sans-serif;
    }

    /* Scène + fond blanc moitié supérieure */
    .stage {
      position: relative;
      min-height: 100dvh;
      padding: env(safe-area-inset-top, 8px) 12px env(safe-area-inset-bottom, 12px);
      box-sizing: border-box;
    }
    .stage::before {
      content: "";
      position: absolute;
      left: 0; right: 0; top: 0; height: 50%;
      background: var(--top-bg);
      z-index: 0;
    }

    /* Ancrages à position fixe (centre absolu HV) */
    .anchor {
      position: absolute;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .anchor.cb2d { top: var(--anchor-cb2d-y); }
    .anchor.ruler { top: var(--anchor-ruler-y); width: min(92vw, 560px); }

    /* CB2D : conteneur à taille physique FIXE (calibrée) */
    .cb2d-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: transparent;     /* passe en rouge sombre si <1 px/module */
      border-radius: 10px;
      transition: background-color 120ms ease;
      box-shadow: 0 8px 28px rgba(0,0,0,0.25);
    }
    canvas#cb2d {
      display: block;
      background: #ffffff;         /* fond interne du symbole pour contraste */
      image-rendering: pixelated;  /* nearest-neighbor : bords nets */
    }

    /* Règle / quadrillage */
    .ruler-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 2 / 1;
      background: #fff;
      color: #111;
      border-radius: 10px;
      box-shadow: inset 0 3px 12px rgba(0,0,0,0.08), 0 8px 24px rgba(0,0,0,0.18);
      overflow: hidden;
    }
    .ruler-title {
      position: absolute;
      top: 6px; left: 10px;
      font-size: 0.8rem; opacity: 0.8; user-select: none; pointer-events: none;
      color: #111;
    }
    canvas#ruler { width: 100%; height: 100%; display: block; }

    /* Panneau des contrôles (lisible) */
    .controls {
      position: absolute;
      left: 50%; bottom: 12px; transform: translateX(-50%);
      width: min(96vw, 720px);
      z-index: 2;
      display: grid; gap: 10px; justify-items: center;
      background: rgba(17, 22, 28, 0.9);
      border: 1px solid #1f2a34;
      border-radius: 14px; padding: 12px 14px;
      box-shadow: 0 10px 32px rgba(0,0,0,0.45);
    }
    .row {
      width: 100%; max-width: 700px;
      display: flex; gap: 12px; align-items: center; justify-content: center; flex-wrap: wrap;
    }
    label { font-size: 0.95rem; opacity: 0.95; }
    input[type="range"] {
      width: min(72vw, 420px);
      accent-color: var(--accent);
    }
    .readout, .readout-short {
      font-variant-numeric: tabular-nums;
      color: #cfe8ff;
      background: var(--panel-2);
      padding: 2px 8px; border-radius: 8px; border: 1px solid #1f2a34;
    }
    .readout { min-width: 7.5ch; text-align: right; }
    .readout-short { min-width: 5.2ch; text-align: right; }

    /* Calibrage */
    details.cal {
      width: 100%; max-width: 720px; background: var(--panel); border: 1px solid #1f2a34; border-radius: 12px;
      padding: 10px 12px; color: var(--fg);
    }
    .cal-row { display: flex; gap: 10px; align-items: center; justify-content: center; flex-wrap: wrap; margin-top: 6px; }
    .bar-5cm { position: relative; height: 14px; border-radius: 7px; background: linear-gradient(90deg,#4b9ef7,#1663c7); box-shadow: 0 2px 6px rgba(0,0,0,0.25) inset; }
    .bar-ends { position: absolute; top: -8px; bottom: -8px; left: 0; right: 0; border-left: 2px solid #111; border-right: 2px solid #111; opacity: 0.8; pointer-events: none; }
    .cal-note { font-size: 0.85rem; opacity: 0.85; text-align: center; margin-top: 4px; }

    /* Footer info (lisible, pas de chevauchement) */
    footer {
      position: absolute; left: 50%; transform: translateX(-50%);
      bottom: calc(12px + 126px);  /* au‑dessus du panneau */
      width: min(96vw, 720px);
      text-align: center; font-size: 0.95rem; line-height: 1.35;
      z-index: 2;
      color: #e6edf3;
      background: rgba(17,22,28,0.86);
      border: 1px solid #1f2a34;
      border-radius: 10px;
      padding: 6px 10px;
      box-shadow: 0 10px 32px rgba(0,0,0,0.35);
    }
  </style>
</head>
<body>
  <main class="stage">
    <!-- CB2D : centre fixe (tiers supérieur) -->
    <div class="anchor cb2d" id="cb2dAnchor">
      <div class="cb2d-wrap" id="cb2dWrap">
        <canvas id="cb2d"></canvas>
      </div>
    </div>

    <!-- Règle / quadrillage : centre fixe -->
    <div class="anchor ruler">
      <div class="ruler-wrap">
        <div class="ruler-title">Quadrillage / règle (mm & cm)</div>
        <canvas id="ruler"></canvas>
      </div>
    </div>

    <!-- Contrôles lisibles -->
    <section class="controls" aria-label="Contrôles">
      <div class="row">
        <label for="sizeRange">Taille</label>
        <input id="sizeRange" type="range" min="1" max="5" step="0.1" value="3" />
        <span class="readout-short"><span id="sizeValue">3.0</span> cm</span>

        <span style="width: 12px;"></span>

        <label for="milsRange">Mils/mod</label>
        <input id="milsRange" type="range" min="2" max="50" step="0.1" value="10" />
        <span class="readout"><span id="milsValue">10.0</span> mils</span>
      </div>

      <div class="row">
        <label for="bytesRange">Octets</label>
        <input id="bytesRange" type="range" min="10" max="512" step="1" value="64" />
        <span class="readout"><span id="bytesValue">64</span></span>
      </div>

      <details class="cal">
        <summary><strong>Calibrage (réglez si la règle ne colle pas au mètre)</strong></summary>
        <div class="cal-row">
          <div>Facteur</div>
          <input id="calRange" type="range" min="0.80" max="1.20" step="0.001" value="1.000" />
          <span class="readout"><span id="calValue">1.000</span>×</span>
          <button id="calReset" type="button">Réinitialiser</button>
        </div>
        <div class="cal-row" style="position:relative">
          <div id="bar5cm" class="bar-5cm" style="width: 200px;"></div>
          <div class="bar-ends" aria-hidden="true"></div>
        </div>
        <div class="cal-note">Ajustez jusqu’à ce que la barre fasse exactement <strong>5,00 cm</strong> au mètre.</div>
      </details>
    </section>

    <footer id="footer">—</footer>
  </main>

  <!-- Générateur Aztec -->
  <script src="https://unpkg.com/bwip-js/dist/bwip-js-min.js"></script>

  <script>
    // ===== Références UI =====
    const cb2dCanvas  = document.getElementById('cb2d');
    const cb2dWrap    = document.getElementById('cb2dWrap');
    const rulerCanvas = document.getElementById('ruler');

    const sizeRange = document.getElementById('sizeRange');
    const sizeValue = document.getElementById('sizeValue');

    const milsRange = document.getElementById('milsRange');
    const milsValue = document.getElementById('milsValue');

    const bytesRange = document.getElementById('bytesRange');
    const bytesValue = document.getElementById('bytesValue');

    const footerEl = document.getElementById('footer');

    // Calibrage UI
    const calRange = document.getElementById('calRange');
    const calValue = document.getElementById('calValue');
    const calReset = document.getElementById('calReset');
    const bar5cmEl = document.getElementById('bar5cm');

    // ===== Constantes =====
    const CM_PER_INCH = 2.54;

    // ===== Détection Moto G7 pour calibrage par défaut =====
    function isMotoG7UA() {
      const ua = (navigator.userAgent || '').toLowerCase();
      return ua.includes('moto g7') || ua.includes('moto g (7') || ua.includes('moto g(7');
    }

    // ===== Mesures CSS =====
    function measureBasePxPerCm() {
      const probe = document.createElement('div');
      probe.style.position = 'absolute';
      probe.style.left = '-9999px';
      probe.style.top = '-9999px';
      probe.style.width = '1cm';
      probe.style.height = '1cm';
      document.body.appendChild(probe);
      const rect = probe.getBoundingClientRect();
      document.body.removeChild(probe);
      return rect.width;
    }
    let basePxPerCm = measureBasePxPerCm();

    function getStoredCal() {
      const v = localStorage.getItem('cb2d_cal_factor');
      if (v) return parseFloat(v);
      // Valeur par défaut : Moto G7 ≈ 1.13×, sinon 1.000×
      return isMotoG7UA() ? 1.13 : 1.000;
    }
    function setStoredCal(f) {
      localStorage.setItem('cb2d_cal_factor', String(f));
      calRange.value = String(f.toFixed(3));
      calValue.textContent = f.toFixed(3);
    }
    function pxPerCm() { return basePxPerCm * getStoredCal(); }
    function updateCalBar() { bar5cmEl.style.width = (5 * pxPerCm()) + 'px'; }

    // ===== Payload (octets ASCII visibles) =====
    function buildPayload(n) {
      let s = '';
      for (let i = 0; i < n; i++) s += String.fromCharCode(33 + (i % 94));
      return s;
    }

    // ===== Comptage des modules (définition C) =====
    // Stratégie : rendu haute échelle (scale=8), bounding box, profil horizontal
    // et vertical au centre, runs noir/blanc -> taille d'un module (px), puis N = largeur/module_px.
    function measureModulesVisible(bcid, text) {
      const SCALE = 8; // échelle de mesure (px par module)
      const tmp = document.createElement('canvas');
      tmp.width = 1200; tmp.height = 1200;
      const ctx = tmp.getContext('2d', { willReadFrequently: true });
      ctx.fillStyle = '#fff';
      ctx.fillRect(0,0,tmp.width,tmp.height);

      try {
        bwipjs.toCanvas(tmp, {
          bcid, text,
          scale: SCALE,
          padding: 0,
          backgroundcolor: 'FFFFFF',
          includetext: false
        });
      } catch (e) {
        console.error('Mesure modules : rendu échoué', e);
        return null;
      }

      const img = ctx.getImageData(0,0,tmp.width,tmp.height).data;

      // Détection bounding box de tout pixel non-blanc
      let minX = tmp.width, minY = tmp.height, maxX = -1, maxY = -1;
      for (let y = 0; y < tmp.height; y++) {
        for (let x = 0; x < tmp.width; x++) {
          const i = (y*tmp.width + x) * 4;
          if ((img[i] + img[i+1] + img[i+2]) < 250*3) {
            if (x < minX) minX = x;
            if (y < minY) minY = y;
            if (x > maxX) maxX = x;
            if (y > maxY) maxY = y;
          }
        }
      }
      if (maxX < 0 || maxY < 0) return null;

      const bbW = maxX - minX + 1;
      const bbH = maxY - minY + 1;
      const midY = Math.floor((minY + maxY) / 2);
      const midX = Math.floor((minX + maxX) / 2);

      // Fonction pour extraire les runs le long d'une ligne
      function getRunsHorizontal(y) {
        const runs = [];
        let prevBlack = null, len = 0;
        for (let x = minX; x <= maxX; x++) {
          const i = (y*tmp.width + x) * 4;
          const isBlack = (img[i] + img[i+1] + img[i+2]) < 250*3;
          if (prevBlack === null) { prevBlack = isBlack; len = 1; }
          else if (isBlack === prevBlack) { len++; }
          else { runs.push(len); prevBlack = isBlack; len = 1; }
        }
        if (len > 0) runs.push(len);
        return runs;
      }
      function getRunsVertical(x) {
        const runs = [];
        let prevBlack = null, len = 0;
        for (let y = minY; y <= maxY; y++) {
          const i = (y*tmp.width + x) * 4;
          const isBlack = (img[i] + img[i+1] + img[i+2]) < 250*3;
          if (prevBlack === null) { prevBlack = isBlack; len = 1; }
          else if (isBlack === prevBlack) { len++; }
          else { runs.push(len); prevBlack = isBlack; len = 1; }
        }
        if (len > 0) runs.push(len);
        return runs;
      }

      const runsH = getRunsHorizontal(midY);
      const runsV = getRunsVertical(midX);

      // Filtrer bruit : on ignore les runs trop courts (< SCALE/3)
      const MIN_RUN = Math.max(2, Math.floor(SCALE/3));
      const filtH = runsH.filter(r => r >= MIN_RUN);
      const filtV = runsV.filter(r => r >= MIN_RUN);

      // Taille d'un module (px) estimée comme le min des runs filtrés (le plus petit bloc)
      const modPxH = filtH.length ? Math.min(...filtH) : Math.min(...runsH);
      const modPxV = filtV.length ? Math.min(...filtV) : Math.min(...runsV);

      // Modules = largeur_bb / taille_module_px
      const nH = Math.round(bbW / modPxH);
      const nV = Math.round(bbH / modPxV);

      // Combine (moyenne arrondie), borne > 0
      const N = Math.max(1, Math.round((nH + nV) / 2));
      return N;
    }

    // ===== Règle calibrée =====
    function renderRuler() {
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      const rect = rulerCanvas.getBoundingClientRect();
      rulerCanvas.width  = Math.floor(rect.width * dpr);
      rulerCanvas.height = Math.floor(rect.height * dpr);

      const ctx = rulerCanvas.getContext('2d');
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      const W = rect.width, H = rect.height;
      const ppcm = pxPerCm();
      const ppmm = ppcm / 10;

      // Fond
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, W, H);

      // Quadrillage mm
      for (let x = 0; x <= W + 0.5; x += ppmm) {
        const mm = Math.round(x / ppmm);
        ctx.beginPath();
        ctx.moveTo(Math.round(x)+0.5, 0);
        ctx.lineTo(Math.round(x)+0.5, H);
        ctx.strokeStyle = (mm % 10 === 0) ? '#cfd6df' : '#eceff4';
        ctx.lineWidth = (mm % 10 === 0) ? 1.0 : 0.5;
        ctx.stroke();
      }
      for (let y = 0; y <= H + 0.5; y += ppmm) {
        const mm = Math.round(y / ppmm);
        ctx.beginPath();
        ctx.moveTo(0, Math.round(y)+0.5);
        ctx.lineTo(W, Math.round(y)+0.5);
        ctx.strokeStyle = (mm % 10 === 0) ? '#cfd6df' : '#eceff4';
        ctx.lineWidth = (mm % 10 === 0) ? 1.0 : 0.5;
        ctx.stroke();
      }

      // Axes centraux
      ctx.strokeStyle = '#9aa7b4';
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(Math.round(W/2)+0.5, 0); ctx.lineTo(Math.round(W/2)+0.5, H);
      ctx.moveTo(0, Math.round(H/2)+0.5); ctx.lineTo(W, Math.round(H/2)+0.5);
      ctx.stroke();

      // Règle cm + ticks mm (haut & gauche)
      ctx.strokeStyle = '#202730';
      ctx.fillStyle = '#202730';
      ctx.lineWidth = 1;

      // Haut (X)
      for (let cm = 0, x = 0; x <= W + 0.001; cm++, x = cm * ppcm) {
        ctx.beginPath(); ctx.moveTo(Math.round(x)+0.5, 0); ctx.lineTo(Math.round(x)+0.5, 10); ctx.stroke();
        ctx.font = '10px system-ui, sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'top';
        ctx.fillText(cm + ' cm', Math.round(x), 12);
        for (let m = 1; m < 10; m++) {
          const xm = x + m * ppmm; if (xm > W) break;
          ctx.beginPath();
          ctx.moveTo(Math.round(xm)+0.5, 0);
          ctx.lineTo(Math.round(xm)+0.5, m % 5 === 0 ? 8 : 5);
          ctx.stroke();
        }
      }

      // Gauche (Y)
      for (let cm = 0, y = 0; y <= H + 0.001; cm++, y = cm * ppcm) {
        ctx.beginPath(); ctx.moveTo(0, Math.round(y)+0.5); ctx.lineTo(10, Math.round(y)+0.5); ctx.stroke();
        ctx.font = '10px system-ui, sans-serif';
        ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
        ctx.fillText(cm + ' cm', 12, Math.round(y));
        for (let m = 1; m < 10; m++) {
          const ym = y + m * ppmm; if (ym > H) break;
          ctx.beginPath();
          ctx.moveTo(0, Math.round(ym)+0.5);
          ctx.lineTo(m % 5 === 0 ? 8 : 5, Math.round(ym)+0.5);
          ctx.stroke();
        }
      }
    }

    // ===== Rendu principal (taille FIXE, modules exacts, bi-liaison mils) =====
    let linkGuard = false; // évite boucles cm <-> mils

    function renderAll(origin) {
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      const bcid = 'azteccode'; // mettre 'azteccodecompact' si besoin
      const bytes = Number(bytesRange.value);
      bytesValue.textContent = bytes;
      const text = buildPayload(bytes);

      // 1) Mesure exacte des modules (déf. C)
      const modules = measureModulesVisible(bcid, text);
      if (!modules) {
        footerEl.textContent = 'Erreur : impossible de compter les modules';
        return;
      }

      // 2) Taille CB2D FIXE (cm -> px calibrés)
      const sizeCm = Number(sizeRange.value);
      sizeValue.textContent = sizeCm.toFixed(1);

      const targetCssPx = sizeCm * pxPerCm(); // px CSS calibrés
      const targetDevPx = targetCssPx * dpr;  // px device

      cb2dWrap.style.width  = targetCssPx + 'px';
      cb2dWrap.style.height = targetCssPx + 'px';
      cb2dCanvas.style.width  = targetCssPx + 'px';
      cb2dCanvas.style.height = targetCssPx + 'px';

      // 3) Densité effective (px/device par module)
      const pxPerModuleEff = targetDevPx / modules;
      const tooSmall = pxPerModuleEff < 1;
      cb2dWrap.style.background = tooSmall ? 'var(--error-bg)' : 'transparent';

      // 4) Mils/module effectif (à taille FIXE)
      const cmPerModule = sizeCm / modules;
      const inchPerModule = cmPerModule / CM_PER_INCH;
      let milsPerModule = inchPerModule * 1000;

      // Mise à jour slider mils si l’origine n’est pas "mils" (et clamp min/max)
      if (!linkGuard && origin !== 'mils') {
        const min = parseFloat(milsRange.min), max = parseFloat(milsRange.max);
        const clamped = Math.max(min, Math.min(max, milsPerModule));
        linkGuard = true;
        milsRange.value = clamped.toFixed(1);
        milsValue.textContent = parseFloat(milsRange.value).toFixed(1);
        linkGuard = false;
      }

      // 5) Rendu CB2D : on rend à une échelle entière proche (oversampling doux),
      //    puis on laisse le CSS ramener à la taille FIXE (nearest-neighbor).
      const baseScale = Math.max(1, Math.round(Math.min(pxPerModuleEff, 12)));
      cb2dCanvas.width  = modules * baseScale;
      cb2dCanvas.height = modules * baseScale;

      const ctx = cb2dCanvas.getContext('2d');
      if (ctx && 'imageSmoothingEnabled' in ctx) ctx.imageSmoothingEnabled = false;
      ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, cb2dCanvas.width, cb2dCanvas.height);

      try {
        if (tooSmall) {
          ctx.fillStyle = '#d33';
          const f = Math.round(14 * dpr);
          ctx.font = `${f}px system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif`;
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText('< 1 px/module', cb2dCanvas.width/2, cb2dCanvas.height/2);
        } else {
          bwipjs.toCanvas(cb2dCanvas, { bcid, text, scale: baseScale, padding: 0, backgroundcolor: 'FFFFFF', includetext: false });
        }
      } catch (err) {
        console.error('Rendu CB2D échoué :', err);
        ctx.fillStyle = '#d00';
        const f = Math.round(14 * dpr);
        ctx.font = `${f}px system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('Erreur CB2D', cb2dCanvas.width/2, cb2dCanvas.height/2);
      }

      // 6) Règle calibrée
      renderRuler();

      // 7) Footer lisible : N×N et mils/mod
      footerEl.textContent = `N : ${modules} × ${modules}  —  mils/mod : ${milsPerModule.toFixed(1)}`;
    }

    // ===== Handlers sliders & calibrage =====
    sizeRange.addEventListener('input', () => renderAll('cm'));

    milsRange.addEventListener('input', () => {
      if (linkGuard) return;
      linkGuard = true;

      // L’utilisateur fixe mils/module -> recalculer la taille CB2D en cm (N constant)
      const milsTarget = Number(milsRange.value);
      milsValue.textContent = milsTarget.toFixed(1);

      // Recompter N modules avec les octets courants (on garde la taille physique à ajuster)
      const bcid = 'azteccode';
      const text = buildPayload(Number(bytesRange.value));
      const modules = measureModulesVisible(bcid, text) || 1;

      const inchPerModule = milsTarget / 1000;
      const cmPerModule = inchPerModule * CM_PER_INCH;
      const sizeCm = cmPerModule * modules;

      const clamped = Math.min(5, Math.max(1, sizeCm));
      sizeRange.value = clamped.toFixed(1);
      sizeValue.textContent = clamped.toFixed(1);

      linkGuard = false;
      renderAll('mils');
    });

    bytesRange.addEventListener('input', () => {
      bytesValue.textContent = bytesRange.value;
      // → Le nombre de modules change ; la taille reste FIXE ; mils/mod se met à jour
      renderAll('data');
    });

    calRange.addEventListener('input', () => {
      const v = parseFloat(calRange.value);
      setStoredCal(v);
      updateCalBar();
      renderAll('cal');
    });
    calReset.addEventListener('click', () => {
      const def = isMotoG7UA() ? 1.13 : 1.00;
      setStoredCal(def);
      updateCalBar();
      renderAll('cal');
    });

    // ===== Init + rotation =====
    (function init() {
      // Calibrage par défaut (Moto G7 ≈ 1.13× sinon 1.00×)
      setStoredCal(getStoredCal());
      updateCalBar();

      renderAll('init');

      window.addEventListener('resize', () => {
        clearTimeout(window.__rRt);
        window.__rRt = setTimeout(() => {
          basePxPerCm = measureBasePxPerCm();
          renderAll('resize');
        }, 120);
      });
    })();
  </script>
</body>
</html>
