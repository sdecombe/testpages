<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>CB2D (Aztec) — taille fixe, mesure exacte N (delta), calibrage</title>
  <style>
    :root{
      color-scheme: light dark;
      --bg:#0d1117; --fg:#e6edf3;
      --panel:#11161c; --panel-2:#0b0f14;
      --accent:#3ea6ff;
      --top-bg:#ffffff;               /* fond blanc moitié supérieure */
      --error-bg:#3b0d0d;             /* <1 px/module */
    }
    html,body{height:100%;margin:0;background:var(--bg);color:var(--fg);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
    /* Mise en page en flux (pas d’overlay) + fond blanc moitié haute */
    .page{
      min-height:100dvh; position:relative;
      display:grid; gap:14px;
      grid-template-rows: 36vh auto auto auto; /* CB2D | règle | contrôles | footer */
      padding: env(safe-area-inset-top,10px) 12px env(safe-area-inset-bottom,12px);
      box-sizing:border-box;
    }
    .page::before{
      content:""; position:absolute; inset:0 0 50% 0; background:var(--top-bg); z-index:0;
    }
    .zone{ position:relative; z-index:1; }
    .zone-top{ display:flex; align-items:center; justify-content:center; } /* centre HV */
    .cb2d-wrap{
      display:inline-flex; align-items:center; justify-content:center;
      border-radius:10px; background:transparent;
      box-shadow:0 8px 28px rgba(0,0,0,.25);
      transition:background-color 120ms ease;
    }
    canvas#cb2d{
      display:block; background:#fff; image-rendering:pixelated; /* bords nets */
    }

    /* Règle */
    .zone-ruler{ display:flex; justify-content:center; }
    .ruler-wrap{
      position:relative; width:min(92vw,560px); aspect-ratio:2/1;
      background:#fff; color:#111; border-radius:10px;
      box-shadow:inset 0 3px 12px rgba(0,0,0,.08), 0 8px 24px rgba(0,0,0,.18);
      overflow:hidden;
    }
    .ruler-title{ position:absolute; top:6px; left:10px; font-size:.8rem; opacity:.8; color:#111; user-select:none }
    canvas#ruler{ width:100%; height:100%; display:block; }

    /* Contrôles lisibles (opaques, en flux) */
    .controls{
      background:var(--panel); border:1px solid #1f2a34; border-radius:12px;
      box-shadow:0 10px 32px rgba(0,0,0,.45);
      padding:12px 14px; display:grid; gap:12px; justify-items:center;
    }
    .row{ width:100%; max-width:820px; display:flex; flex-wrap:wrap; gap:12px; align-items:center; justify-content:center }
    label{ font-size:.95rem; opacity:.95 }
    input[type="range"]{ width:min(72vw,480px); accent-color:var(--accent) }
    .readout, .pill{
      font-variant-numeric:tabular-nums; color:#cfe8ff; background:var(--panel-2);
      padding:2px 8px; border-radius:8px; border:1px solid #1f2a34;
    }
    .readout{ min-width:6.2ch; text-align:right }
    .pill{ white-space:nowrap }

    /* Paramètres Aztec (optionnels) */
    .aztec-block{
      width:100%; max-width:820px; background:var(--panel);
      border:1px solid #1f2a34; border-radius:12px; padding:10px 12px;
      display:grid; gap:10px;
    }
    select{
      background:var(--panel-2); color:var(--fg); border:1px solid #1f2a34; border-radius:8px; padding:6px 8px;
      min-width:10ch;
    }

    /* Profil + Calibrage étendu (sans overlay) */
    .cal-block{
      width:100%; max-width:820px; background:var(--panel);
      border:1px solid #1f2a34; border-radius:12px; padding:10px 12px;
      display:grid; gap:10px;
    }
    .cal-controls{ display:flex; flex-wrap:wrap; gap:12px; align-items:center; justify-content:center }
    input[type="number"]{
      background:var(--panel-2); color:var(--fg); border:1px solid #1f2a34; border-radius:8px; padding:6px 8px;
      width:7.5ch
    }
    .bar-row{ display:flex; gap:12px; align-items:center; justify-content:center; flex-wrap:wrap }
    .bar{ position:relative; height:16px; border-radius:8px; background:linear-gradient(90deg,#4b9ef7,#1663c7);
      box-shadow:inset 0 2px 6px rgba(0,0,0,.25) }
    .bar-ends{ position:absolute; top:-8px; bottom:-8px; left:0; right:0; border-left:2px solid #111; border-right:2px solid #111; opacity:.85; pointer-events:none }

    /* Footer lisible en bas, sans chevauchement */
    footer{
      background:var(--panel); border:1px solid #1f2a34; border-radius:10px;
      padding:8px 10px; text-align:center;
      box-shadow:0 10px 32px rgba(0,0,0,.35);
      color:#e6edf3;
    }
  </style>
</head>
<body>
  <main class="page">
    <!-- CB2D (centre HV dans la zone supérieure) -->
    <section class="zone zone-top" aria-label="CB2D">
      <div id="cb2dWrap" class="cb2d-wrap">
        <canvas id="cb2d"></canvas>
      </div>
    </section>

    <!-- Règle / quadrillage (centre fixe de sa zone) -->
    <section class="zone zone-ruler" aria-label="Quadrillage et règle">
      <div class="ruler-wrap">
        <div class="ruler-title">Quadrillage / règle (mm & cm)</div>
        <canvas id="ruler"></canvas>
      </div>
    </section>

    <!-- Contrôles -->
    <section class="zone controls" aria-label="Contrôles">
      <!-- 1) Taille (unique) + Octets -->
      <div class="row">
        <label for="sizeRange">Taille</label>
        <input id="sizeRange" type="range" min="1" max="5" step="0.1" value="3" />
        <span class="readout"><span id="sizeValue">3.0</span> cm</span>

        <span class="pill" id="derivedInfo">—</span>
      </div>

      <div class="row">
        <label for="bytesRange">Octets</label>
        <input id="bytesRange" type="range" min="10" max="512" step="1" value="64" />
        <span class="readout"><span id="bytesValue">64</span></span>
      </div>

      <!-- 2) Paramètres Aztec (optionnels) -->
      <div class="aztec-block" aria-label="Paramètres Aztec (optionnels)">
        <div class="row">
          <label for="modeSel">Mode</label>
          <select id="modeSel">
            <option value="full" selected>Full (azteccode)</option>
            <option value="compact">Compact (azteccodecompact)</option>
          </select>

          <label for="layersSel">Layers</label>
          <select id="layersSel">
            <option value="auto" selected>auto</option>
            <option value="0">0</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
          </select>
          <span class="pill" id="aztecInfo">Mode: full • Layers: auto</span>
        </div>
        <div style="opacity:.8; font-size:.9rem; text-align:center">
          Astuce : en <em>Full</em>, <code>layers=1</code> ⇒ <strong>N=19</strong>. En <em>Compact</em>, <code>layers=1</code> ⇒ <strong>N=17</strong>.
        </div>
      </div>

      <!-- 3) Profil + Calibrage -->
      <div class="cal-block" aria-label="Profil & calibrage">
        <div class="cal-controls">
          <label for="profileSel">Profil</label>
          <select id="profileSel">
            <option value="motoG7">Moto G7 (défaut)</option>
            <option value="custom">Personnalisé</option>
          </select>

          <label for="calRange">Facteur</label>
          <input id="calRange" type="range" min="0.60" max="1.60" step="0.001" value="1.600" />
          <input id="calNum" type="number" min="0.600" max="1.600" step="0.001" value="1.600" />
        </div>

        <div class="cal-controls">
          <span>Étalon</span>
          <label><input type="radio" name="barLen" value="5" checked /> 5 cm</label>
          <label><input type="radio" name="barLen" value="10" /> 10 cm</label>
        </div>

        <div class="bar-row">
          <div id="bar" class="bar" style="width:200px"></div>
          <div class="bar-ends" aria-hidden="true"></div>
        </div>
        <div style="text-align:center;opacity:.85;font-size:.9rem">Ajuste le facteur pour que la barre fasse exactement la longueur choisie au mètre.</div>
      </div>
    </section>

    <!-- Footer (infos demandées) -->
    <footer id="footer">—</footer>
  </main>

  <!-- Générateur Aztec -->
  <script src="https://unpkg.com/bwip-js/dist/bwip-js-min.js"></script>

  <script>
    /* =========================
       Calibrage & persistance
    ==========================*/
    const CM_PER_INCH = 2.54;

    function measureBasePxPerCm(){
      const el = document.createElement('div');
      el.style.position='absolute'; el.style.left='-9999px'; el.style.top='-9999px';
      el.style.width='1cm'; el.style.height='1cm';
      document.body.appendChild(el);
      const px = el.getBoundingClientRect().width;
      el.remove();
      return px;
    }
    let basePxPerCm = measureBasePxPerCm();

    // localStorage keys
    const LS_PROFILE = 'cb2d_profile';
    const LS_CAL_MOTO = 'cb2d_cal_moto';
    const LS_CAL_CUSTOM = 'cb2d_cal_custom';
    const LS_BARLEN = 'cb2d_cal_barlen';
    const LS_MODE = 'cb2d_mode';
    const LS_LAYERS = 'cb2d_layers';

    function getProfile(){ return localStorage.getItem(LS_PROFILE) || 'motoG7'; }
    function setProfile(p){ localStorage.setItem(LS_PROFILE, p); }

    function getCalFactor(profile){
      if(profile==='motoG7'){
        const v = parseFloat(localStorage.getItem(LS_CAL_MOTO));
        return Number.isFinite(v) ? v : 1.600;  // défaut Moto G7 corrigé
      }else{
        const v = parseFloat(localStorage.getItem(LS_CAL_CUSTOM));
        return Number.isFinite(v) ? v : 1.000;
      }
    }
    function setCalFactor(profile, f){
      localStorage.setItem(profile==='motoG7' ? LS_CAL_MOTO : LS_CAL_CUSTOM, String(f));
    }

    function pxPerCm(profile){ return basePxPerCm * getCalFactor(profile); }

    function getBarLenCm(){
      const v = localStorage.getItem(LS_BARLEN);
      return v ? parseInt(v,10) : 5;
    }
    function setBarLenCm(n){ localStorage.setItem(LS_BARLEN, String(n)); }

    function getMode(){ return localStorage.getItem(LS_MODE) || 'full'; }
    function setMode(m){ localStorage.setItem(LS_MODE, m); }

    function getLayers(){
      return localStorage.getItem(LS_LAYERS) || 'auto';
    }
    function setLayers(v){
      localStorage.setItem(LS_LAYERS, v);
    }

    /* =========================
       Mesure exacte N par delta
       - rend à scale=1 et scale=2
       - annule offset & corrige DPR
    ==========================*/
    function measureModulesDelta(bcid, text, eclevel) {
		const result = bwipjs.raw({
			bcid,
			text,
			eclevel
		})[0];

		const N = result.pixx;

      // Bornes de bon sens
      if (N < 9 || N > 191) return null;

      return N;
    }

    /* =========================
       Règle calibrée
    ==========================*/
    const rulerCanvas = document.getElementById('ruler');
    function renderRuler(profile){
      const dpr=Math.max(1,window.devicePixelRatio||1);
      const rect=rulerCanvas.getBoundingClientRect();
      rulerCanvas.width=Math.floor(rect.width*dpr);
      rulerCanvas.height=Math.floor(rect.height*dpr);
      const ctx=rulerCanvas.getContext('2d');
      ctx.setTransform(dpr,0,0,dpr,0,0);

      const W=rect.width, H=rect.height;
      const ppcm=pxPerCm(profile), ppmm=ppcm/10;

      ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H);

      for(let x=0;x<=W+0.5;x+=ppmm){
        const mm=Math.round(x/ppmm);
        ctx.beginPath(); ctx.moveTo(Math.round(x)+0.5,0); ctx.lineTo(Math.round(x)+0.5,H);
        ctx.strokeStyle=(mm%10===0)?'#cfd6df':'#eceff4'; ctx.lineWidth=(mm%10===0)?1.0:0.5; ctx.stroke();
      }
      for(let y=0;y<=H+0.5;y+=ppmm){
        const mm=Math.round(y/ppmm);
        ctx.beginPath(); ctx.moveTo(0,Math.round(y)+0.5); ctx.lineTo(W,Math.round(y)+0.5);
        ctx.strokeStyle=(mm%10===0)?'#cfd6df':'#eceff4'; ctx.lineWidth=(mm%10===0)?1.0:0.5; ctx.stroke();
      }

      ctx.strokeStyle='#9aa7b4'; ctx.lineWidth=1.2;
      ctx.beginPath();
      ctx.moveTo(Math.round(W/2)+0.5,0); ctx.lineTo(Math.round(W/2)+0.5,H);
      ctx.moveTo(0,Math.round(H/2)+0.5); ctx.lineTo(W,Math.round(H/2)+0.5);
      ctx.stroke();

      ctx.strokeStyle='#202730'; ctx.fillStyle='#202730'; ctx.lineWidth=1; ctx.font='10px system-ui, sans-serif';

      for(let cm=0,x=0;x<=W+0.001;cm++,x=cm*ppcm){
        ctx.beginPath(); ctx.moveTo(Math.round(x)+0.5,0); ctx.lineTo(Math.round(x)+0.5,10); ctx.stroke();
        ctx.textAlign='center'; ctx.textBaseline='top'; ctx.fillText(cm+' cm', Math.round(x), 12);
        for (let m=1;m<10;m++){
          const xm=x+m*ppmm; if(xm>W) break;
          ctx.beginPath(); ctx.moveTo(Math.round(xm)+0.5,0); ctx.lineTo(Math.round(xm)+0.5,(m%5===0?8:5)); ctx.stroke();
        }
      }
      for(let cm=0,y=0;y<=H+0.001;cm++,y=cm*ppcm){
        ctx.beginPath(); ctx.moveTo(0,Math.round(y)+0.5); ctx.lineTo(10,Math.round(y)+0.5); ctx.stroke();
        ctx.textAlign='left'; ctx.textBaseline='middle'; ctx.fillText(cm+' cm',12,Math.round(y));
        for (let m=1;m<10;m++){
          const ym=y+m*ppmm; if(ym>H) break;
          ctx.beginPath(); ctx.moveTo(0,Math.round(ym)+0.5);
          ctx.lineTo((m%5===0?8:5),Math.round(ym)+0.5); ctx.stroke();
        }
      }
    }

    /* =========================
       Rendu CB2D taille FIXE
    ==========================*/
    const cb2dCanvas=document.getElementById('cb2d');
    const cb2dWrap=document.getElementById('cb2dWrap');

    function buildPayload(n){
      let s=''; for(let i=0;i<n;i++) s+=String.fromCharCode(33+(i%94)); return s;
    }

    const sizeRange = document.getElementById('sizeRange');
    const sizeValue = document.getElementById('sizeValue');
    const bytesRange= document.getElementById('bytesRange');
    const bytesValue= document.getElementById('bytesValue');
    const footer   = document.getElementById('footer');
    const derivedInfo = document.getElementById('derivedInfo');

    const profileSel = document.getElementById('profileSel');
    const calRange   = document.getElementById('calRange');
    const calNum     = document.getElementById('calNum');
    const barEl      = document.getElementById('bar');
    const barRadios  = [...document.querySelectorAll('input[name="barLen"]')];

    const modeSel    = document.getElementById('modeSel');
    const layersSel  = document.getElementById('layersSel');
    const aztecInfo  = document.getElementById('aztecInfo');

    function getAztecOpts() {
      const mode = modeSel.value;      // 'full' | 'compact'
      const layersV = layersSel.value; // 'auto' | '0'..'8'
      const bcid = (mode === 'compact') ? 'azteccodecompact' : 'azteccode';
      const opts = {};
      if (layersV !== 'auto') {
        opts.layers = parseInt(layersV, 10);
      }
      return { bcid, opts, mode, layersV };
    }

    function syncAztecInfo() {
      const { mode, layersV } = getAztecOpts();
      aztecInfo.textContent = `Mode: ${mode} • Layers: ${layersV}`;
    }

    function renderAll(){
      const profile = profileSel.value;
	  const eccLevel = 23;

      // 1) valeurs UI
      const sizeCm = Number(sizeRange.value); sizeValue.textContent=sizeCm.toFixed(1);
      const bytes = Number(bytesRange.value); bytesValue.textContent=bytes;

      // 2) paramètres Aztec (mode/layers)
      const { bcid, opts } = getAztecOpts();

      // 3) modules (déf. C) — mesure exacte par delta (annule DPR + offset)
      const text=buildPayload(bytes);
      const N = measureModulesDelta(bcid, text, eccLevel) || 1;

      // 4) taille CSS calibrée FIXE
      const dpr=Math.max(1,window.devicePixelRatio||1);
      const targetCssPx = sizeCm * pxPerCm(profile);
      const targetDevPx = targetCssPx * dpr;

      cb2dWrap.style.width = targetCssPx+'px';
      cb2dWrap.style.height= targetCssPx+'px';
      cb2dCanvas.style.width = targetCssPx+'px';
      cb2dCanvas.style.height= targetCssPx+'px';

      // 5) densité et alerte
      const pxPerModule = targetDevPx / N;
      const tooSmall = pxPerModule < 1;
      cb2dWrap.style.background = tooSmall ? 'var(--error-bg)' : 'transparent';

      // 6) mils/module
      const cmPerModule = sizeCm / N;
      const milsPerModule = (cmPerModule / CM_PER_INCH) * 1000;

      // 7) rendu oversamplé puis ramené à taille FIXE (nearest-neighbor)
      const baseScale = Math.max(1, Math.round(Math.min(pxPerModule, 12)));
      cb2dCanvas.width = N * baseScale;
      cb2dCanvas.height= N * baseScale;

      const ctx = cb2dCanvas.getContext('2d');
      if(ctx && 'imageSmoothingEnabled' in ctx) ctx.imageSmoothingEnabled=false;
      ctx.fillStyle='#fff'; ctx.fillRect(0,0,cb2dCanvas.width,cb2dCanvas.height);

      try{
        if(tooSmall){
          ctx.fillStyle='#d33';
          const f=Math.round(14*dpr);
          ctx.font=`${f}px system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif`;
          ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.fillText('< 1 px/module', cb2dCanvas.width/2, cb2dCanvas.height/2);
        }else{
          bwipjs.toCanvas(cb2dCanvas, {
            bcid, text,
            scale: baseScale,
            padding: 0,
			eccLevel: eccLevel,
            includetext: false,
            backgroundcolor: 'FFFFFF',
            ...opts
          });
        }
      }catch(err){
        console.error('Rendu CB2D échoué :', err);
        ctx.fillStyle='#d00';
        const f=Math.round(14*dpr);
        ctx.font=`${f}px system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif`;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('Erreur CB2D', cb2dCanvas.width/2, cb2dCanvas.height/2);
      }

      // 8) Règle & Footer & derive info
      renderRuler(profile);
      footer.textContent = `N : ${N} × ${N} — mils/mod : ${milsPerModule.toFixed(1)} — Taille : ${sizeCm.toFixed(1)} cm`;
      derivedInfo.textContent = `N=${N} • ${milsPerModule.toFixed(1)} mils/mod`;

      // Mettre à jour la barre étalon (calibrage)
      updateBarWidth(profile);
    }

    /* =========================
       UI & Calibrage
    ==========================*/
    function updateBarWidth(profile){
      const cm = getBarLenCm();
      const px = cm * pxPerCm(profile);
      barEl.style.width = px + 'px';
    }

    function syncCalUIFromState(){
      const p = getProfile();
      profileSel.value = p;
      const f = getCalFactor(p);
      calRange.value = f.toFixed(3);
      calNum.value   = f.toFixed(3);
      const L = getBarLenCm();
      document.querySelectorAll('input[name="barLen"]').forEach(r=> r.checked = (parseInt(r.value,10)===L));
      updateBarWidth(p);
    }

    // Elements
    sizeRange.addEventListener('input', renderAll);
    bytesRange.addEventListener('input', renderAll);

    profileSel.addEventListener('change', ()=>{
      const p = profileSel.value;
      setProfile(p);
      if(p==='motoG7' && !localStorage.getItem(LS_CAL_MOTO)) setCalFactor('motoG7', 1.600);
      if(p==='custom' && !localStorage.getItem(LS_CAL_CUSTOM)) setCalFactor('custom', 1.000);
      syncCalUIFromState();
      renderAll();
    });

    calRange.addEventListener('input', ()=>{
      const p=profileSel.value; const v=parseFloat(calRange.value);
      calNum.value = v.toFixed(3);
      setCalFactor(p, v);
      renderAll();
    });
    calNum.addEventListener('input', ()=>{
      const p=profileSel.value; let v=parseFloat(calNum.value);
      if(!Number.isFinite(v)) return;
      v=Math.max(0.600, Math.min(1.600, v));
      calNum.value=v.toFixed(3); calRange.value=v.toFixed(3);
      setCalFactor(p, v);
      renderAll();
    });
    document.querySelectorAll('input[name="barLen"]').forEach(r=> r.addEventListener('change', ()=>{
      const L=parseInt(document.querySelector('input[name="barLen"]:checked').value,10);
      setBarLenCm(L);
      updateBarWidth(profileSel.value);
    }));

    modeSel.addEventListener('change', ()=>{
      setMode(modeSel.value);
      syncAztecInfo();
      renderAll();
    });
    layersSel.addEventListener('change', ()=>{
      setLayers(layersSel.value);
      syncAztecInfo();
      renderAll();
    });

    function syncAztecUIFromState(){
      const mode = getMode();
      const layers = getLayers();
      modeSel.value = mode;
      layersSel.value = layers;
      syncAztecInfo();
    }

    // Init + resize
    (function init(){
      // Profil Moto G7 par défaut + facteurs par défaut s'ils n'existent pas déjà
      if(!localStorage.getItem(LS_PROFILE)) setProfile('motoG7');
      if(!localStorage.getItem(LS_CAL_MOTO)) setCalFactor('motoG7', 1.600);
      if(!localStorage.getItem(LS_CAL_CUSTOM)) setCalFactor('custom', 1.000);
      if(!localStorage.getItem(LS_BARLEN)) setBarLenCm(5);
      if(!localStorage.getItem(LS_MODE)) setMode('full');
      if(!localStorage.getItem(LS_LAYERS)) setLayers('auto');

      syncCalUIFromState();
      syncAztecUIFromState();
      renderAll();

      window.addEventListener('resize', ()=>{
        clearTimeout(window.__rt);
        window.__rt=setTimeout(()=>{
          basePxPerCm = measureBasePxPerCm();
          renderAll();
        },120);
      });
    })();
  </script>
</body>
</html>
