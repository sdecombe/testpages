<div id="frag"></div>

<script>
function escapeHtml(originalStr) {
let escapeStr = originalStr.replace(/&/g, '&amp;')
  .replace(/</g, '&lt;')
  .replace(/>/g, '&gt;')
  .replace(/"/g, '&quot;')
  .replace(/'/g, '&#39;');
  return escapeStr;
}
//const hash = new URLSearchParams(location.hash.slice(1));
//const data = JSON.parse(atob(hash.get("d")));
let searchParams = new URLSearchParams(location.hash.substring(1))
for (const p of searchParams) {
  console.log("param:"+p);
  document.getElementById("frag").innerHTML+= "<p>"+escapeHtml(String(p))+"</p>";
}
