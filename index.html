<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>CB2D (Aztec) – calibré, taille fixe, mils/module, règle</title>

  <style>
    :root {
      color-scheme: light dark;
      --bg: #f3f4f6;
      --fg: #111;
      --top-bg: #ffffff;          /* fond blanc moitié supérieure */
      --code-size-cm: 3;          /* taille cible du CB2D en cm (1–5) */
      --error: #ffebe9;           /* fond d’alerte si <1 px/module */
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f1115;
        --fg: #e8e8e8;
        --top-bg: #ffffff;
      }
    }

    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", sans-serif;
    }

    /* Disposition en grille pour ancrer CB2D et règle à des zones fixes */
    .page {
      min-height: 100dvh;
      display: grid;
      grid-template-rows:
        34vh        /* zone top pour CB2D (tiers supérieur) */
        auto        /* zone règle */
        auto        /* contrôles du bas (volume données + mils/module) */
        auto;       /* footer (infos modules + mils) */
      gap: 8px;
      align-items: start;
      padding: env(safe-area-inset-top, 12px) 14px env(safe-area-inset-bottom, 14px);
      box-sizing: border-box;
      position: relative;
    }

    /* Fond blanc moitié supérieure, sous le contenu */
    .page::before {
      content: "";
      position: absolute;
      left: 0; right: 0; top: 0; height: 50%;
      background: var(--top-bg);
      z-index: 0;
    }

    /* Zones de contenu */
    .zone {
      position: relative;
      z-index: 1;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* ---- Zone CB2D (ancrée et centrée dans la zone haute) ---- */
    .zone-cb2d {
      /* rien de plus, le grid garde la zone haute stable */
    }
    .cb2d-wrap {
      /* conteneur centré, sans padding: la taille est pilotée en JS */
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: transparent;              /* passera au rouge si erreur */
      border-radius: 8px;
      transition: background-color 120ms ease;
    }
    canvas#cb2d {
      display: block;
      background: #ffffff;                  /* fond interne du symbole */
      image-rendering: pixelated;           /* pas de flou */
    }

    /* ---- Zone règle ---- */
    .zone-ruler {
      padding: 4px 0 2px 0;
    }
    .ruler-wrap {
      /* taille visuelle ~8cm x ~4cm, la précision vient du canvas calibré */
      width: min(92vw, 560px);
      max-width: 560px;
      aspect-ratio: 2 / 1;   /* réserve de place stable, le canvas gère l’échelle */
      background: #fff;
      border-radius: 8px;
      box-shadow: inset 0 3px 12px rgba(0,0,0,0.08), 0 2px 10px rgba(0,0,0,0.06);
      position: relative;
      overflow: hidden;
    }
    .ruler-title {
      position: absolute;
      top: 6px;
      left: 10px;
      font-size: 0.8rem;
      opacity: 0.7;
      user-select: none;
      pointer-events: none;
      z-index: 1;
    }
    canvas#ruler {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ---- Contrôles ---- */
    .controls {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      justify-items: center;
    }

    .row {
      width: 100%;
      max-width: 600px;
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
    }
    label {
      font-size: 0.95rem;
      opacity: 0.9;
    }
    input[type="range"] {
      width: min(70vw, 380px);
    }
    .readout {
      min-width: 7ch;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .readout-short {
      min-width: 5ch;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    /* ---- Calibrage ---- */
    details.cal {
      width: 100%;
      max-width: 640px;
      margin: 0 auto;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 1px 8px rgba(0,0,0,0.06);
      padding: 8px 10px 10px 10px;
    }
    .cal-row {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 6px;
    }
    .bar-5cm {
      position: relative;
      height: 14px;
      border-radius: 7px;
      background: linear-gradient(90deg, #4b9ef7, #1663c7);
      box-shadow: 0 2px 6px rgba(0,0,0,0.15) inset;
    }
    .bar-ends {
      position: absolute;
      top: -8px; bottom: -8px;
      left: 0; right: 0;
      border-left: 2px solid #111;
      border-right: 2px solid #111;
      opacity: 0.7;
      pointer-events: none;
    }
    .cal-note {
      font-size: 0.85rem;
      opacity: 0.8;
      text-align: center;
      margin-top: 4px;
    }

    /* ---- Footer ---- */
    footer {
      width: 100%;
      text-align: center;
      font-size: 0.95rem;
      line-height: 1.35;
      opacity: 0.96;
      padding-bottom: 2px;
    }
  </style>
</head>
<body>
  <main class="page">

    <!-- Zone CB2D (tiers supérieur, centre stable) -->
    <section class="zone zone-cb2d" aria-label="CB2D">
      <div id="cb2dWrap" class="cb2d-wrap">
        <canvas id="cb2d"></canvas>
      </div>
    </section>

    <!-- Zone Règle (centre zone stable) -->
    <section class="zone zone-ruler" aria-label="Quadrillage et règle">
      <div class="ruler-wrap">
        <div class="ruler-title">Quadrillage / règle (mm & cm)</div>
        <canvas id="ruler"></canvas>
      </div>
    </section>

    <!-- Contrôles -->
    <section class="controls" aria-label="Contrôles">
      <!-- Taille CB2D (cm) + Mils/module (liés bidirectionnellement) -->
      <div class="row">
        <label for="sizeRange">Taille CB2D :</label>
        <input id="sizeRange" type="range" min="1" max="5" step="0.1" value="3" />
        <span class="readout-short"><span id="sizeValue">3.0</span> cm</span>

        <span style="width:16px"></span>

        <label for="milsRange">Mils/module :</label>
        <input id="milsRange" type="range" min="2" max="50" step="0.1" value="10" />
        <span class="readout"><span id="milsValue">10.0</span> mils</span>
      </div>

      <!-- Volume de données (ne change pas la position ni la logique d’ancrage) -->
      <div class="row">
        <label for="bytesRange">Volume données :</label>
        <input id="bytesRange" type="range" min="10" max="512" step="1" value="64" />
        <span class="readout"><span id="bytesValue">64</span> octets</span>
      </div>

      <!-- Calibrage (facultatif, mais recommandé si le mètre ne matche pas) -->
      <details class="cal">
        <summary><strong>Calibrage (recommandé si la règle ne fait pas la bonne longueur au mètre)</strong></summary>
        <div class="cal-row">
          <div>Facteur :</div>
          <input id="calRange" type="range" min="0.80" max="1.20" step="0.001" value="1.000" />
          <span class="readout"><span id="calValue">1.000</span>×</span>
          <button id="calReset" type="button">Réinitialiser</button>
        </div>
        <div class="cal-row">
          <!-- Barre « 5 cm » calibrée -->
          <div id="bar5cm" class="bar-5cm" style="width: 200px;"></div>
          <div class="bar-ends" aria-hidden="true"></div>
        </div>
        <div class="cal-note">Ajuste jusqu’à ce que la barre fasse exactement <strong>5,00 cm</strong> sur ton mètre.</div>
      </details>
    </section>

    <!-- Footer : infos modules + mils -->
    <footer id="footer">—</footer>
  </main>

  <!-- Librairie CB2D (Aztec) -->
  <script src="https://unpkg.com/bwip-js/dist/bwip-js-min.js"></script>

  <script>
    // ---------- Éléments UI ----------
    const cb2dCanvas  = document.getElementById('cb2d');
    const cb2dWrap    = document.getElementById('cb2dWrap');
    const rulerCanvas = document.getElementById('ruler');

    const sizeRange = document.getElementById('sizeRange');
    const sizeValue = document.getElementById('sizeValue');

    const milsRange = document.getElementById('milsRange');
    const milsValue = document.getElementById('milsValue');

    const bytesRange = document.getElementById('bytesRange');
    const bytesValue = document.getElementById('bytesValue');

    const footerEl  = document.getElementById('footer');

    // Calibrage
    const calRange  = document.getElementById('calRange');
    const calValue  = document.getElementById('calValue');
    const calReset  = document.getElementById('calReset');
    const bar5cmEl  = document.getElementById('bar5cm');

    // ---------- Paramètres ----------
    const settings = {
      compact: false,     // si tu veux forcer azteccodecompact
      // eclevel: '23',   // optionnel pour Aztec
    };

    // ---------- Helpers mesures ----------
    function measureBasePxPerCm() {
      const probe = document.createElement('div');
      probe.style.position = 'absolute';
      probe.style.left = '-9999px';
      probe.style.top = '-9999px';
      probe.style.width = '1cm';
      probe.style.height = '1cm';
      document.body.appendChild(probe);
      const rect = probe.getBoundingClientRect();
      document.body.removeChild(probe);
      return rect.width; // px CSS pour 1 cm CSS
    }
    let basePxPerCm = measureBasePxPerCm();

    // Calibrage utilisateur (multiplicatif) persistant
    function getCalFactor() {
      const v = localStorage.getItem('cb2d_cal_factor');
      return v ? parseFloat(v) : 1.0;
    }
    function setCalFactor(f) {
      localStorage.setItem('cb2d_cal_factor', String(f));
      calRange.value = String(f.toFixed(3));
      calValue.textContent = f.toFixed(3);
    }
    function pxPerCm() {
      return basePxPerCm * getCalFactor();
    }
    function updateCalBar() {
      // largeur physique calibrée de 5 cm : 5 * pxPerCm
      bar5cmEl.style.width = (5 * pxPerCm()) + 'px';
    }

    // Convertisseurs
    const CM_PER_INCH = 2.54;

    // ---------- Générateur payload ----------
    function buildPayload(n) {
      // 1 octet = 1 caractère ASCII visible (33..126)
      let s = '';
      for (let i = 0; i < n; i++) s += String.fromCharCode(33 + (i % 94));
      return s;
    }

    // ---------- Mesure du nombre de modules ----------
    function measureModules(bcid, text) {
      const tmp = document.createElement('canvas');
      tmp.width = 900; tmp.height = 900;
      const ctx = tmp.getContext('2d', { willReadFrequently: true });
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, tmp.width, tmp.height);
      try {
        bwipjs.toCanvas(tmp, { bcid, text, scale: 1, padding: 0, backgroundcolor: 'FFFFFF', includetext: false });
      } catch(e) {
        console.error('Mesure modules échouée:', e);
        return null;
      }
      const data = ctx.getImageData(0, 0, tmp.width, tmp.height).data;
      let minX = tmp.width, minY = tmp.height, maxX = -1, maxY = -1;
      for (let y = 0; y < tmp.height; y++) {
        for (let x = 0; x < tmp.width; x++) {
          const i = (y*tmp.width + x)*4;
          // pixel noir si r+g+b < seuil
          if ((data[i]+data[i+1]+data[i+2]) < 250*3) {
            if (x<minX) minX=x; if (y<minY) minY=y; if (x>maxX) maxX=x; if (y>maxY) maxY=y;
          }
        }
      }
      if (maxX<0 || maxY<0) return null;
      const w = maxX - minX + 1;
      const h = maxY - minY + 1;
      return Math.max(w, h); // à scale=1 => #modules
    }

    // ---------- Rendu CB2D ----------
    let suppressLink = false;  // évite boucles entre sliders cm <-> mils
    function renderCB2D(origin) {
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      const bcid = settings.compact ? 'azteccodecompact' : 'azteccode';

      const bytes = Number(bytesRange.value);
      bytesValue.textContent = bytes;
      const text = buildPayload(bytes);

      // 1) Nombre de modules (côté) à données fixes
      const modules = measureModules(bcid, text);
      if (!modules || modules < 1) {
        footerEl.textContent = 'Erreur: impossible de déterminer le nombre de modules';
        return;
      }

      // 2) Taille cible en cm (slider) -> px CSS calibrés
      const cmsTarget = Number(sizeRange.value);
      sizeValue.textContent = cmsTarget.toFixed(1);
      const targetCssPx = cmsTarget * pxPerCm();      // px CSS « calibrés »
      const targetDevPx = targetCssPx * dpr;          // pixels device

      // 3) Échelle entière (px/device par module) pour rester net
      let scale = Math.floor(targetDevPx / modules);
      const tooSmall = (scale < 1);

      // 4) Calcul mils/module + liaison bidirectionnelle
      //    module_mils = (px/module / dpr) / pxPerCm * 1in * 1000
      let moduleMils;
      if (!tooSmall) {
        const moduleCssPx = scale / dpr;
        const moduleInch  = (moduleCssPx / pxPerCm()) / CM_PER_INCH;
        moduleMils = moduleInch * 1000;
      } else {
        moduleMils = (1 / dpr) / pxPerCm() / CM_PER_INCH * 1000; // théorique si on forçait scale=1
      }

      if (!suppressLink) {
        suppressLink = true;
        if (origin === 'cm') {
          milsRange.value = moduleMils.toFixed(1);
          milsValue.textContent = parseFloat(milsRange.value).toFixed(1);
        } else if (origin === 'mils') {
          // Si l’utilisateur bouge le slider mils, recalculer la taille en cm
          const milsTarget = Number(milsRange.value);
          const inchesPerModule = milsTarget / 1000;
          const cmPerModule = inchesPerModule * CM_PER_INCH;
          const cmForSymbol = cmPerModule * modules;
          // On borne 1–5 cm, puis met à jour sizeRange
          const clamped = Math.min(5, Math.max(1, cmForSymbol));
          sizeRange.value = clamped.toFixed(1);
          sizeValue.textContent = clamped.toFixed(1);
        }
        suppressLink = false;
      }

      // 5) Taille effective réalisable (entier) et rendu
      const effDevPx = Math.max(0, modules * Math.max(scale, 0)); // 0 si trop petit
      const effCssPx = effDevPx / dpr;

      // Fond d’erreur si <1 px/module
      cb2dWrap.style.background = tooSmall ? 'var(--error)' : 'transparent';

      // Dimensionne le conteneur et le canvas
      cb2dWrap.style.width  = effCssPx + 'px';
      cb2dWrap.style.height = effCssPx + 'px';
      cb2dCanvas.width  = effDevPx;
      cb2dCanvas.height = effDevPx;
      cb2dCanvas.style.width  = effCssPx + 'px';
      cb2dCanvas.style.height = effCssPx + 'px';

      // Rendu symbol
      const ctx = cb2dCanvas.getContext('2d');
      if (ctx && 'imageSmoothingEnabled' in ctx) ctx.imageSmoothingEnabled = false;
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, cb2dCanvas.width, cb2dCanvas.height);

      try {
        if (tooSmall) {
          // N’affiche pas un symbole illisible : montre un message
          ctx.fillStyle = '#d00';
          ctx.font = Math.round(14 * dpr) + 'px system-ui, sans-serif';
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText('Erreur : <1 px/module', cb2dCanvas.width/2, cb2dCanvas.height/2);
        } else {
          bwipjs.toCanvas(cb2dCanvas, {
            bcid, text,
            scale: scale,
            padding: 0,
            backgroundcolor: 'FFFFFF',
            includetext: false
            // eclevel: settings.eclevel
          });
        }
      } catch (err) {
        console.error('Rendu CB2D échoué:', err);
        ctx.fillStyle = '#d00';
        ctx.font = Math.round(14 * dpr) + 'px system-ui, sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('Erreur CB2D', cb2dCanvas.width/2, cb2dCanvas.height/2);
      }

      // 6) Footer : modules + mils/module (effectifs)
      // Recalcule mils effectifs après snapping
      let moduleMilsEff = moduleMils;
      if (!tooSmall) {
        const moduleCssPxEff = scale / dpr;
        const moduleInchEff  = (moduleCssPxEff / pxPerCm()) / CM_PER_INCH;
        moduleMilsEff = moduleInchEff * 1000;
      }
      footerEl.textContent =
        `Modules : ${modules}×${modules} — Module : ${moduleMilsEff.toFixed(1)} mils`;
    }

    // ---------- Rendu Règle ----------
    function renderRuler() {
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      const rect = rulerCanvas.getBoundingClientRect();
      rulerCanvas.width  = Math.floor(rect.width * dpr);
      rulerCanvas.height = Math.floor(rect.height * dpr);

      const ctx = rulerCanvas.getContext('2d');
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      const W = rect.width, H = rect.height;

      const _pxPerCm = pxPerCm();
      const pxPerMm = _pxPerCm / 10;

      // Fond
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, W, H);

      // Quadrillage mm
      for (let x = 0; x <= W + 0.5; x += pxPerMm) {
        const mmIndex = Math.round(x / pxPerMm);
        ctx.beginPath();
        ctx.moveTo(Math.round(x) + 0.5, 0);
        ctx.lineTo(Math.round(x) + 0.5, H);
        ctx.strokeStyle = (mmIndex % 10 === 0) ? '#cfd6df' : '#eceff4';
        ctx.lineWidth = (mmIndex % 10 === 0) ? 1.0 : 0.5;
        ctx.stroke();
      }
      for (let y = 0; y <= H + 0.5; y += pxPerMm) {
        const mmIndex = Math.round(y / pxPerMm);
        ctx.beginPath();
        ctx.moveTo(0, Math.round(y) + 0.5);
        ctx.lineTo(W, Math.round(y) + 0.5);
        ctx.strokeStyle = (mmIndex % 10 === 0) ? '#cfd6df' : '#eceff4';
        ctx.lineWidth = (mmIndex % 10 === 0) ? 1.0 : 0.5;
        ctx.stroke();
      }

      // Axes centraux
      ctx.strokeStyle = '#9aa7b4';
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(Math.round(W/2)+0.5, 0); ctx.lineTo(Math.round(W/2)+0.5, H);
      ctx.moveTo(0, Math.round(H/2)+0.5); ctx.lineTo(W, Math.round(H/2)+0.5);
      ctx.stroke();

      // Règle cm (haut et gauche) avec ticks mm
      ctx.strokeStyle = '#202730';
      ctx.fillStyle = '#202730';
      ctx.lineWidth = 1;

      // Ticks haut (X)
      for (let cm = 0, x = 0; x <= W + 0.001; cm++, x = cm * _pxPerCm) {
        ctx.beginPath(); ctx.moveTo(Math.round(x)+0.5, 0); ctx.lineTo(Math.round(x)+0.5, 10); ctx.stroke();
        ctx.font = '10px system-ui, sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'top';
        ctx.fillText(cm + ' cm', Math.round(x), 12);
        for (let m = 1; m < 10; m++) {
          const xm = x + m * pxPerMm; if (xm > W) break;
          ctx.beginPath();
          ctx.moveTo(Math.round(xm)+0.5, 0);
          ctx.lineTo(Math.round(xm)+0.5, m % 5 === 0 ? 8 : 5);
          ctx.stroke();
        }
      }

      // Ticks gauche (Y)
      for (let cm = 0, y = 0; y <= H + 0.001; cm++, y = cm * _pxPerCm) {
        ctx.beginPath(); ctx.moveTo(0, Math.round(y)+0.5); ctx.lineTo(10, Math.round(y)+0.5); ctx.stroke();
        ctx.font = '10px system-ui, sans-serif';
        ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
        ctx.fillText(cm + ' cm', 12, Math.round(y));
        for (let m = 1; m < 10; m++) {
          const ym = y + m * pxPerMm; if (ym > H) break;
          ctx.beginPath();
          ctx.moveTo(0, Math.round(ym)+0.5);
          ctx.lineTo(m % 5 === 0 ? 8 : 5, Math.round(ym)+0.5);
          ctx.stroke();
        }
      }
    }

    // ---------- Handlers ----------
    function rerenderAll(origin) {
      renderCB2D(origin);
      renderRuler();
      updateCalBar();
    }
    sizeRange.addEventListener('input', () => rerenderAll('cm'));
    milsRange.addEventListener('input', () => rerenderAll('mils'));
    bytesRange.addEventListener('input', () => rerenderAll('data'));

    calRange.addEventListener('input', () => {
      const v = parseFloat(calRange.value);
      setCalFactor(v);
      rerenderAll('cal');
    });
    calReset.addEventListener('click', () => {
      setCalFactor(1.0);
      rerenderAll('cal');
    });

    // ---------- Init ----------
    (function init() {
      // Charger facteur de calibration (si présent)
      const cal = getCalFactor();
      calRange.value = String(cal.toFixed(3));
      calValue.textContent = cal.toFixed(3);
      updateCalBar();

      rerenderAll('init');
      // Re-mesurer si rotation
      window.addEventListener('resize', () => {
        clearTimeout(window.__rRt);
        window.__rRt = setTimeout(() => {
          basePxPerCm = measureBasePxPerCm(); // rare mais certains browsers changent ce ratio
          rerenderAll('resize');
        }, 120);
      });
    })();
  </script>
</body>
</html>
