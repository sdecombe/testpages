<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>CB2D (Aztec) – taille réglable, module en mils, volume de données</title>

  <style>
    :root {
      color-scheme: light dark;
      --bg: #f3f4f6;
      --fg: #111;
      --code-size-cm: 3; /* taille cible du CB2D (1–5 cm), hors marge */
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f1115;
        --fg: #e8e8e8;
      }
    }

    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", sans-serif;
    }

    /* Conteneur principal */
    .page {
      min-height: 100%;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: env(safe-area-inset-top, 12px) 16px env(safe-area-inset-bottom, 16px);
      box-sizing: border-box;
      gap: 10px;
    }

    /* Fond blanc sur la moitié supérieure */
    .page::before {
      content: "";
      position: absolute;
      inset: 0 0 50% 0;   /* haut : 0, bas : 50% => moitié supérieure */
      background: #ffffff;
      z-index: 0;
    }

    /* Couche de contenu */
    .content {
      position: relative;
      z-index: 1;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    /* Contrôles (haut) : taille du CB2D */
    .controls-top {
      width: 100%;
      max-width: 560px;
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
      margin-top: 2px;
      flex-wrap: wrap;
    }
    .controls-top label {
      font-size: 0.95rem;
      opacity: 0.9;
    }
    .controls-top input[type="range"] {
      width: min(70vw, 360px);
    }
    .size-readout {
      min-width: 5.5ch;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    /* Zone CB2D (en haut), sans marge autour du symbole */
    .code-area {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-top: 2px;
    }
    .code-box {
      /* Pas de padding ni arrière-plan : la taille = symbole uniquement */
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-sizing: content-box;
      /* largeur/hauteur seront fixées en JS pour coller au pas de module */
    }
    canvas#cb2d {
      display: block;
      /* largeur/hauteur CSS sont pilotées en JS pour correspondre au rendu device */
      image-rendering: pixelated; /* garde des arêtes nettes si mise à l’échelle CSS */
      background: #ffffff;  /* fond du symbole */
    }

    /* Quadrillage / règle au milieu de page */
    .ruler-area {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 8px 0;
    }
    .ruler-wrap {
      width: 8cm;
      height: 4cm;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 3px 12px rgba(0,0,0,0.08) inset, 0 2px 10px rgba(0,0,0,0.06);
      position: relative;
      overflow: hidden;
    }
    .ruler-title {
      position: absolute;
      top: 6px;
      left: 10px;
      font-size: 0.8rem;
      opacity: 0.7;
      user-select: none;
      pointer-events: none;
    }
    canvas#ruler {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Contrôle (bas) : volume de données */
    .controls-bottom {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 560px;
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      padding-top: 4px;
    }
    .controls-bottom label {
      font-size: 0.95rem;
      opacity: 0.9;
    }
    .controls-bottom input[type="range"] {
      width: min(70vw, 360px);
    }
    .bytes-readout {
      min-width: 7ch;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    /* Pied de page : affiche la taille d’un module en mils */
    footer {
      position: relative;
      z-index: 1;
      width: 100%;
      text-align: center;
      font-size: 0.95rem;
      line-height: 1.35;
      opacity: 0.95;
      padding-top: 2px;
    }

    :focus-visible {
      outline: 2px solid #4c9ffe;
      outline-offset: 2px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="content">
      <!-- Contrôle haut : taille du CB2D -->
      <div class="controls-top" aria-label="Réglage de la taille du CB2D">
        <label for="sizeRange">Taille du CB2D :</label>
        <input id="sizeRange" type="range" min="1" max="5" step="0.1" value="3" />
        <span class="size-readout"><span id="sizeValue">3.0</span> cm</span>
      </div>

      <!-- Symbole CB2D (en haut) -->
      <section class="code-area" aria-label="Zone du CB2D (Aztec)">
        <div class="code-box" id="code-box">
          <canvas id="cb2d"></canvas>
        </div>
      </section>

      <!-- Quadrillage / règle (milieu de page) -->
      <section class="ruler-area" aria-label="Quadrillage et règle">
        <div class="ruler-wrap">
          <div class="ruler-title">Quadrillage / règle (mm & cm)</div>
          <canvas id="ruler"></canvas>
        </div>
      </section>

      <!-- Contrôle bas : volume de données -->
      <div class="controls-bottom" aria-label="Réglage du volume de données du CB2D">
        <label for="bytesRange">Volume de données :</label>
        <input id="bytesRange" type="range" min="10" max="512" step="1" value="64" />
        <span class="bytes-readout"><span id="bytesValue">64</span> octets</span>
      </div>
    </div>

    <!-- Pied de page : taille de module en mils -->
    <footer id="footer-text">Module : — mils</footer>
  </main>

  <!-- bwip-js (génération CB2D/Aztec) -->
  <script src="https://unpkg.com/bwip-js/dist/bwip-js-min.js"></script>

  <script>
    /**
     * Paramètres initiaux
     * - compact : true => CB2D compact (capacité réduite, symbole plus petit)
     * - eclevel : pour Aztec, on peut forcer un pourcentage si besoin (optionnel)
     */
    const settings = {
      content: "CB2D_CONTENT_PLACEHOLDER",
      compact: false
      // eclevel: '23' // exemple : 23% si vous voulez forcer (optionnel)
    };

    // Éléments UI
    const sizeRange  = document.getElementById('sizeRange');
    const sizeValue  = document.getElementById('sizeValue');
    const bytesRange = document.getElementById('bytesRange');
    const bytesValue = document.getElementById('bytesValue');
    const footerEl   = document.getElementById('footer-text');

    // Canvases / conteneurs
    const canvas = document.getElementById('cb2d');
    const codeBox = document.getElementById('code-box');

    // Règle (quadrillage)
    const rulerCanvas = document.getElementById('ruler');

    // Génère un payload de N octets (ASCII visibles, 1 octet par caractère)
    function buildPayload(n) {
      // ASCII 33..126 (94 caractères), cyclés
      let s = '';
      for (let i = 0; i < n; i++) {
        s += String.fromCharCode(33 + (i % 94));
      }
      return s;
    }

    // Mesure le nombre de modules (carrés) du CB2D en rendant à scale=1 (pas de marge)
    function measureModulesCount(bcid, text) {
      // Canvas temporaire suffisamment grand
      const tmp = document.createElement('canvas');
      tmp.width = 600;  // suffisant pour CB2D jusqu’aux grandes tailles
      tmp.height = 600;
      const tctx = tmp.getContext('2d', { willReadFrequently: true });
      // Fond blanc
      tctx.fillStyle = '#fff';
      tctx.fillRect(0, 0, tmp.width, tmp.height);

      try {
        bwipjs.toCanvas(tmp, {
          bcid,
          text,
          scale: 1,         // 1 pixel par module
          padding: 0,       // aucune marge
          backgroundcolor: 'FFFFFF',
          includetext: false
        });
      } catch (e) {
        console.error('Erreur mesure modules (rendu scale=1) :', e);
        return null;
      }

      const img = tctx.getImageData(0, 0, tmp.width, tmp.height).data;

      // Recherche de la bounding-box non-blanche (luminance < 250) pour trouver le symbole
      const isWhite = (r,g,b) => (r + g + b) >= (250 * 3);

      let minX = tmp.width, minY = tmp.height, maxX = -1, maxY = -1;
      for (let y = 0; y < tmp.height; y++) {
        for (let x = 0; x < tmp.width; x++) {
          const idx = (y * tmp.width + x) * 4;
          const r = img[idx], g = img[idx+1], b = img[idx+2];
          if (!isWhite(r,g,b)) {
            if (x < minX) minX = x;
            if (y < minY) minY = y;
            if (x > maxX) maxX = x;
            if (y > maxY) maxY = y;
          }
        }
      }

      if (maxX < 0 || maxY < 0) {
        // rien trouvé
        return null;
      }

      const widthPx  = maxX - minX + 1;
      const heightPx = maxY - minY + 1;
      // Le symbole est carré : prendre le max par sécurité
      return Math.max(widthPx, heightPx); // à scale=1 => = nombre de modules
    }
