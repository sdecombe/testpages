<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Code Aztec mobile – taille réglable</title>

  <style>
    :root {
      color-scheme: light dark;
      --bg: #f3f4f6;
      --fg: #111;
      --code-size-cm: 3; /* taille du code-barres (1 à 5 cm), sans marge */
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f1115;
        --fg: #e8e8e8;
      }
    }

    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", sans-serif;
    }

    /* Conteneur global */
    .page {
      min-height: 100%;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: env(safe-area-inset-top, 12px) 16px env(safe-area-inset-bottom, 24px);
      box-sizing: border-box;
      gap: 10px;
    }

    /* Fond blanc sur la moitié supérieure (sous le contenu) */
    .page::before {
      content: "";
      position: absolute;
      inset: 0 0 50% 0; /* haut: 0, bas: 50% -> moitié supérieure */
      background: #ffffff;
      z-index: 0;
    }

    /* Couche de contenu au-dessus du fond */
    .content {
      position: relative;
      z-index: 1;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    /* Contrôles (slider) */
    .controls {
      width: 100%;
      max-width: 520px;
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
      margin-top: 2px;
      flex-wrap: wrap;
    }
    .controls label {
      font-size: 0.95rem;
      opacity: 0.9;
    }
    .controls input[type="range"] {
      width: min(70vw, 360px);
    }
    .size-readout {
      min-width: 4ch;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    /* Zone du code (vers le haut), sans marge autour du symbole */
    .code-area {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-top: 2px;
    }
    .code-box {
      /* plus de padding, plus de fond : taille = symbole uniquement */
      width: calc(var(--code-size-cm) * 1cm);
      height: calc(var(--code-size-cm) * 1cm);
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: content-box; /* la taille CSS correspond au symbole */
    }
    /* Le canvas occupe 100% de la boîte, sans marge */
    canvas#aztec {
      display: block;
      width: 100%;
      height: 100%;
      background: #ffffff; /* fond interne blanc si tu veux garantir un fond du symbole */
    }

    /* Quadrillage / règle au milieu */
    .ruler-area {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 8px 0;
    }
    .ruler-wrap {
      width: 8cm;
      height: 4cm;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 3px 12px rgba(0,0,0,0.08) inset, 0 2px 10px rgba(0,0,0,0.06);
      position: relative;
      overflow: hidden;
    }
    .ruler-title {
      position: absolute;
      top: 6px;
      left: 10px;
      font-size: 0.8rem;
      opacity: 0.7;
      user-select: none;
      pointer-events: none;
    }
    canvas#ruler {
      width: 100%;
      height: 100%;
      display: block;
    }

    footer {
      width: 100%;
      text-align: center;
      font-size: 0.95rem;
      line-height: 1.35;
      opacity: 0.9;
      padding-top: 8px;
    }

    :focus-visible {
      outline: 2px solid #4c9ffe;
      outline-offset: 2px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="content">
      <!-- Contrôle de taille -->
      <div class="controls" aria-label="Réglage de la taille du code Aztec">
        <label for="sizeRange">Taille du code :</label>
        <input id="sizeRange" type="range" min="1" max="5" step="0.1" value="3" />
        <span class="size-readout"><span id="sizeValue">3.0</span> cm</span>
      </div>

      <!-- Code Aztec (en haut) -->
      <section class="code-area" aria-label="Zone du code Aztec">
        <div class="code-box" id="code-box">
          <canvas id="aztec"></canvas>
        </div>
      </section>

      <!-- Quadrillage / règle (milieu de page) -->
      <section class="ruler-area" aria-label="Quadrillage et règle">
        <div class="ruler-wrap">
          <div class="ruler-title">Quadrillage / règle (mm & cm)</div>
          <canvas id="ruler"></canvas>
        </div>
      </section>
    </div>

    <footer id="footer-text">Texte de bas de page</footer>
  </main>

  <!-- bwip-js (génération Aztec côté client) -->
  <script src="https://unpkg.com/bwip-js/dist/bwip-js-min.js"></script>

  <script>
    /**
     * Paramètres à ajuster
     * - content : la donnée encodée (URL, texte, etc.)
     * - footer  : texte de bas de page
     * - compact : true pour Aztec compact
     */
    const settings = {
      content: "AZTEC_CONTENT_HERE",  // ex: "https://exemple.com/checkin"
      footer: "Texte de bas de page",
      compact: false
    };

    // Met le footer
    document.getElementById("footer-text").textContent = settings.footer;

    // ---- Rendu du code Aztec (taille = symbole seulement) ----
    function renderAztec() {
      const canvas = document.getElementById('aztec');
      const box = document.getElementById('code-box');

      // Taille cible en px CSS (sans marge)
      const rect = box.getBoundingClientRect();
      const sizeCss = Math.floor(Math.min(rect.width, rect.height));

      // Haute densité
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      canvas.width  = Math.floor(sizeCss * dpr);
      canvas.height = Math.floor(sizeCss * dpr);
      canvas.style.width  = sizeCss + 'px';
      canvas.style.height = sizeCss + 'px';

      // Choix du symbole
      const bcid = settings.compact ? 'azteccodecompact' : 'azteccode';

      // Efface le canvas
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      try {
        // Pas de padding interne : taille exacte du symbole
        // On ajuste l'échelle pour remplir le carré cible
        const scale = Math.max(2, Math.floor((sizeCss * dpr) / 120));

        bwipjs.toCanvas(canvas, {
          bcid,
          text: settings.content,
          scale: scale,
          padding: 0,               // *** aucune marge ajoutée ***
          backgroundcolor: 'FFFFFF',
          includetext: false
        });
      } catch (err) {
        console.error('Erreur bwip-js:', err);
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#d00';
        ctx.font = (14 * dpr) + 'px system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('Erreur Aztec', canvas.width/2, canvas.height/2);
      }
    }

    // ---- Quadrillage / Règle ----
    function renderRuler() {
      const canvas = document.getElementById('ruler');
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      const rect = canvas.getBoundingClientRect();
      canvas.width  = Math.floor(rect.width * dpr);
      canvas.height = Math.floor(rect.height * dpr);
      const ctx = canvas.getContext('2d');
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      const W = rect.width;
      const H = rect.height;

      // Mesure CSS de 1cm -> pixels
      const probe = document.createElement('div');
      probe.style.position = 'absolute';
      probe.style.left = '-9999px';
      probe.style.top = '-9999px';
      probe.style.width = '1cm';
      probe.style.height = '1cm';
      document.body.appendChild(probe);
      const cmRect = probe.getBoundingClientRect();
      document.body.removeChild(probe);
      const pxPerCm = cmRect.width;
      const pxPerMm = pxPerCm / 10;

      // Fond
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, W, H);

      // Quadrillage mm
      for (let x = 0; x <= W + 0.5; x += pxPerMm) {
        ctx.beginPath();
        ctx.moveTo(Math.round(x) + 0.5, 0);
        ctx.lineTo(Math.round(x) + 0.5, H);
        const mmIndex = Math.round(x / pxPerMm);
        ctx.strokeStyle = (mmIndex % 10 === 0) ? '#d0d6e0' : '#eceff4';
        ctx.lineWidth = (mmIndex % 10 === 0) ? 1.0 : 0.5;
        ctx.stroke();
      }
      for (let y = 0; y <= H + 0.5; y += pxPerMm) {
        ctx.beginPath();
        ctx.moveTo(0, Math.round(y) + 0.5);
        ctx.lineTo(W, Math.round(y) + 0.5);
        const mmIndex = Math.round(y / pxPerMm);
        ctx.strokeStyle = (mmIndex % 10 === 0) ? '#d0d6e0' : '#eceff4';
        ctx.lineWidth = (mmIndex % 10 === 0) ? 1.0 : 0.5;
        ctx.stroke();
      }

      // Axes centraux
      ctx.strokeStyle = '#9aa7b4';
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(Math.round(W/2)+0.5, 0); ctx.lineTo(Math.round(W/2)+0.5, H);
      ctx.moveTo(0, Math.round(H/2)+0.5); ctx.lineTo(W, Math.round(H/2)+0.5);
      ctx.stroke();

      // Règle cm (haut et gauche) avec ticks mm
      ctx.strokeStyle = '#202730';
      ctx.fillStyle = '#202730';
      ctx.lineWidth = 1;

      // Ticks en haut (X)
      for (let cm = 0, x = 0; x <= W + 0.001; cm++, x = cm * pxPerCm) {
        ctx.beginPath(); ctx.moveTo(Math.round(x)+0.5, 0); ctx.lineTo(Math.round(x)+0.5, 10); ctx.stroke();
        ctx.font = '10px system-ui, sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'top';
        ctx.fillText(cm + ' cm', Math.round(x), 12);
        for (let m = 1; m < 10; m++) {
          const xm = x + m * pxPerMm; if (xm > W) break;
          ctx.beginPath();
          ctx.moveTo(Math.round(xm)+0.5, 0);
          ctx.lineTo(Math.round(xm)+0.5, m % 5 === 0 ? 8 : 5);
          ctx.stroke();
        }
      }

      // Ticks à gauche (Y)
      for (let cm = 0, y = 0; y <= H + 0.001; cm++, y = cm * pxPerCm) {
        ctx.beginPath(); ctx.moveTo(0, Math.round(y)+0.5); ctx.lineTo(10, Math.round(y)+0.5); ctx.stroke();
        ctx.font = '10px system-ui, sans-serif';
        ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
        ctx.fillText(cm + ' cm', 12, Math.round(y));
        for (let m = 1; m < 10; m++) {
          const ym = y + m * pxPerMm; if (ym > H) break;
          ctx.beginPath();
          ctx.moveTo(0, Math.round(ym)+0.5);
          ctx.lineTo(m % 5 === 0 ? 8 : 5, Math.round(ym)+0.5);
          ctx.stroke();
        }
      }
    }

    // ---- Slider 1–5 cm (taille du symbole) ----
    const sizeRange = document.getElementById('sizeRange');
    const sizeValue = document.getElementById('sizeValue');

    function applySizeFromSlider() {
      const cm = Number(sizeRange.value);
      document.documentElement.style.setProperty('--code-size-cm', cm.toString());
      sizeValue.textContent = cm.toFixed(1);
      renderAztec();
    }
    sizeRange.addEventListener('input', applySizeFromSlider);

    // Rendus initiaux + sur resize/rotation
    function renderAll() {
      applySizeFromSlider(); // met à jour et rend l'Aztec
      renderRuler();
    }
    renderAll();
    window.addEventListener('resize', () => {
      clearTimeout(window.__reflowTimer);
      window.__reflowTimer = setTimeout(renderAll, 120);
    });
  </script>
</body>
</html>
