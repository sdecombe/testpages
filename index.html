<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>CB2D (Aztec) – taille fixe, mils/module, centre fixe, règle calibrée</title>

  <style>
    :root {
      color-scheme: light dark;
      --bg: #f3f4f6;
      --fg: #111;
      --top-bg: #ffffff;  /* fond blanc moitié supérieure */
      --error: #ffebe9;   /* fond si < 1 px/module */
      --anchor-cb2d-y: 28vh; /* centre vertical du CB2D (tiers supérieur) */
      --anchor-ruler-y: 60vh;/* centre vertical de la règle */
      --size-cm: 3;           /* taille cible du symbole (1–5 cm) */
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #0f1115; --fg: #e8e8e8; --top-bg: #ffffff; }
    }

    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", sans-serif;
    }

    /* Scène ancrée + fond blanc sur la moitié supérieure */
    .stage {
      position: relative;
      min-height: 100dvh;
      padding: env(safe-area-inset-top, 8px) 12px env(safe-area-inset-bottom, 12px);
      box-sizing: border-box;
    }
    .stage::before {
      content: "";
      position: absolute;
      left: 0; right: 0; top: 0; height: 50%;
      background: var(--top-bg);
      z-index: 0;
    }

    /* Ancrages : centre fixe, H & V */
    .anchor {
      position: absolute;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .anchor.cb2d { top: var(--anchor-cb2d-y); }
    .anchor.ruler { top: var(--anchor-ruler-y); width: min(92vw, 560px); }

    /* CB2D : conteneur de taille physique FIXE (CSS) */
    .cb2d-wrap {
      background: transparent;  /* passe au rouge si <1 px/module */
      border-radius: 8px;
      transition: background-color 120ms ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    canvas#cb2d {
      display: block;
      background: #ffffff;      /* fond du symbole (utile pour contraste) */
      image-rendering: pixelated; /* nearest-neighbor pour garder des arêtes nettes lors du redimensionnement CSS */
    }

    /* Règle / quadrillage (centrée) */
    .ruler-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 2 / 1;      /* réserve d'espace stable */
      background: #fff;
      border-radius: 8px;
      box-shadow: inset 0 3px 12px rgba(0,0,0,0.08), 0 2px 10px rgba(0,0,0,0.06);
      overflow: hidden;
    }
    .ruler-title {
      position: absolute;
      top: 6px; left: 10px;
      font-size: 0.8rem; opacity: 0.7; user-select: none; pointer-events: none;
    }
    canvas#ruler { width: 100%; height: 100%; display: block; }

    /* Panneau des contrôles (en bas de l’écran) */
    .controls {
      position: absolute;
      left: 50%; bottom: 12px; transform: translateX(-50%);
      width: min(96vw, 680px);
      z-index: 2;
      display: grid; gap: 10px; justify-items: center;
      background: rgba(255,255,255,0.65);
      backdrop-filter: saturate(1.2) blur(6px);
      border-radius: 12px; padding: 10px 12px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.12);
    }
    .row {
      width: 100%; max-width: 640px;
      display: flex; gap: 10px; align-items: center; justify-content: center; flex-wrap: wrap;
    }
    label { font-size: 0.95rem; opacity: 0.9; }
    input[type="range"] { width: min(70vw, 380px); }
    .readout { min-width: 7ch; text-align: right; font-variant-numeric: tabular-nums; }
    .readout-short { min-width: 5ch; text-align: right; font-variant-numeric: tabular-nums; }

    /* Calibrage */
    details.cal {
      width: 100%; max-width: 660px; background: #fff; border-radius: 10px;
      box-shadow: 0 1px 8px rgba(0,0,0,0.06);
      padding: 8px 10px 10px 10px;
    }
    .cal-row { display: flex; gap: 10px; align-items: center; justify-content: center; flex-wrap: wrap; margin-top: 6px; }
    .bar-5cm { position: relative; height: 14px; border-radius: 7px; background: linear-gradient(90deg,#4b9ef7,#1663c7); box-shadow: 0 2px 6px rgba(0,0,0,0.15) inset; }
    .bar-ends { position: absolute; top: -8px; bottom: -8px; left: 0; right: 0; border-left: 2px solid #111; border-right: 2px solid #111; opacity: 0.7; pointer-events: none; }
    .cal-note { font-size: 0.85rem; opacity: 0.8; text-align: center; margin-top: 4px; }

    /* Footer info (modules + mils) */
    footer {
      position: absolute; left: 50%; transform: translateX(-50%);
      bottom: calc(12px + 110px); /* au-dessus des contrôles */
      width: min(96vw, 680px);
      text-align: center; font-size: 0.95rem; line-height: 1.35; opacity: 0.96;
      z-index: 2;
      text-wrap: balance;
    }
  </style>
</head>
<body>
  <main class="stage">
    <!-- CB2D : centre fixe dans le tiers supérieur -->
    <div class="anchor cb2d" id="cb2dAnchor">
      <div class="cb2d-wrap" id="cb2dWrap">
        <canvas id="cb2d"></canvas>
      </div>
    </div>

    <!-- Règle / quadrillage : centre fixe -->
    <div class="anchor ruler">
      <div class="ruler-wrap">
        <div class="ruler-title">Quadrillage / règle (mm & cm)</div>
        <canvas id="ruler"></canvas>
      </div>
    </div>

    <!-- Contrôles (collés en bas, semi-transparents) -->
    <section class="controls" aria-label="Contrôles">
      <div class="row">
        <label for="sizeRange">Taille CB2D :</label>
        <input id="sizeRange" type="range" min="1" max="5" step="0.1" value="3" />
        <span class="readout-short"><span id="sizeValue">3.0</span> cm</span>

        <span style="width:16px"></span>

        <label for="milsRange">Mils/module :</label>
        <input id="milsRange" type="range" min="2" max="50" step="0.1" value="10" />
        <span class="readout"><span id="milsValue">10.0</span> mils</span>
      </div>

      <div class="row">
        <label for="bytesRange">Volume données :</label>
        <input id="bytesRange" type="range" min="10" max="512" step="1" value="64" />
        <span class="readout"><span id="bytesValue">64</span> octets</span>
      </div>

      <details class="cal">
        <summary><strong>Calibrage (réglez si la règle ne correspond pas au mètre)</strong></summary>
        <div class="cal-row">
          <div>Facteur :</div>
          <input id="calRange" type="range" min="0.80" max="1.20" step="0.001" value="1.000" />
          <span class="readout"><span id="calValue">1.000</span>×</span>
          <button id="calReset" type="button">Réinitialiser</button>
        </div>
        <div class="cal-row" style="position:relative">
          <div id="bar5cm" class="bar-5cm" style="width: 200px;"></div>
          <div class="bar-ends" aria-hidden="true"></div>
        </div>
        <div class="cal-note">Ajuste jusqu’à ce que la barre fasse exactement <strong>5,00 cm</strong> au mètre.</div>
      </details>
    </section>

    <footer id="footer">—</footer>
  </main>

  <!-- bwip-js pour CB2D (Aztec) -->
  <script src="https://unpkg.com/bwip-js/dist/bwip-js-min.js"></script>

  <script>
    // ====== Références UI ======
    const cb2dCanvas  = document.getElementById('cb2d');
    const cb2dWrap    = document.getElementById('cb2dWrap');
    const rulerCanvas = document.getElementById('ruler');

    const sizeRange = document.getElementById('sizeRange');
    const sizeValue = document.getElementById('sizeValue');

    const milsRange = document.getElementById('milsRange');
    const milsValue = document.getElementById('milsValue');

    const bytesRange = document.getElementById('bytesRange');
    const bytesValue = document.getElementById('bytesValue');

    const footerEl = document.getElementById('footer');

    const calRange = document.getElementById('calRange');
    const calValue = document.getElementById('calValue');
    const calReset = document.getElementById('calReset');
    const bar5cmEl = document.getElementById('bar5cm');

    // ====== Constantes & État ======
    const CM_PER_INCH = 2.54;

    function measureBasePxPerCm() {
      const probe = document.createElement('div');
      probe.style.position = 'absolute';
      probe.style.left = '-9999px';
      probe.style.top = '-9999px';
      probe.style.width = '1cm';
      probe.style.height = '1cm';
      document.body.appendChild(probe);
      const rect = probe.getBoundingClientRect();
      document.body.removeChild(probe);
      return rect.width;
    }
    let basePxPerCm = measureBasePxPerCm();

    function getCalFactor() {
      const v = localStorage.getItem('cb2d_cal_factor');
      return v ? parseFloat(v) : 1.0;
    }
    function setCalFactor(f) {
      localStorage.setItem('cb2d_cal_factor', String(f));
      calRange.value = String(f.toFixed(3));
      calValue.textContent = f.toFixed(3);
    }
    function pxPerCm() { return basePxPerCm * getCalFactor(); }
    function updateCalBar() { bar5cmEl.style.width = (5 * pxPerCm()) + 'px'; }

    // Génère un payload ASCII de N octets
    function buildPayload(n) {
      let s = '';
      for (let i = 0; i < n; i++) s += String.fromCharCode(33 + (i % 94));
      return s;
    }

    // Mesure le nombre de modules (côté) à scale=1
    function measureModules(bcid, text) {
      const tmp = document.createElement('canvas');
      tmp.width = 900; tmp.height = 900;
      const ctx = tmp.getContext('2d', { willReadFrequently: true });
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, tmp.width, tmp.height);
      try {
        bwipjs.toCanvas(tmp, { bcid, text, scale: 1, padding: 0, backgroundcolor: 'FFFFFF', includetext: false });
      } catch (e) {
        console.error('Mesure modules échouée:', e);
        return null;
      }
      const data = ctx.getImageData(0, 0, tmp.width, tmp.height).data;
      let minX = tmp.width, minY = tmp.height, maxX = -1, maxY = -1;
      for (let y = 0; y < tmp.height; y++) {
        for (let x = 0; x < tmp.width; x++) {
          const i = (y*tmp.width + x) * 4;
          if ((data[i] + data[i+1] + data[i+2]) < 250*3) { // non-blanc
            if (x < minX) minX = x;
            if (y < minY) minY = y;
            if (x > maxX) maxX = x;
            if (y > maxY) maxY = y;
          }
        }
      }
      if (maxX < 0 || maxY < 0) return null;
      return Math.max(maxX - minX + 1, maxY - minY + 1); // #modules
    }

    // Liaisons pour éviter boucles cm <-> mils
    let linkGuard = false;

    function renderAll(origin) {
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      const bcid = 'azteccode'; // ou 'azteccodecompact' si tu veux forcer compact
      const bytes = Number(bytesRange.value);
      bytesValue.textContent = bytes;
      const text = buildPayload(bytes);

      // 1) Modules (côté)
      const modules = measureModules(bcid, text);
      if (!modules) {
        footerEl.textContent = 'Erreur : impossible de déterminer le nombre de modules';
        return;
      }

      // 2) Taille CB2D cible (cm) -> pixels CSS calibrés et device
      const sizeCm = Number(sizeRange.value);
      sizeValue.textContent = sizeCm.toFixed(1);
      const targetCssPx = sizeCm * pxPerCm();         // CSS px calibrés (taille physique FIXE)
      const targetDevPx = targetCssPx * dpr;          // device px
      // On impose la taille CSS FIXE au conteneur et au canvas (affichage)
      cb2dWrap.style.width  = targetCssPx + 'px';
      cb2dWrap.style.height = targetCssPx + 'px';
      cb2dCanvas.style.width  = targetCssPx + 'px';
      cb2dCanvas.style.height = targetCssPx + 'px';

      // 3) Pas effectif en pixels device par module (dépend du volume de données)
      const pxPerModuleEff = targetDevPx / modules;

      // 4) Alerte si < 1 pixel device par module
      const tooSmall = pxPerModuleEff < 1;
      cb2dWrap.style.background = tooSmall ? 'var(--error)' : 'transparent';

      // 5) Calcul mils/module effectif (fixe en fonction de taille FIXE et modules)
      const moduleCm = (sizeCm / modules);                 // cm par module
      const moduleInch = moduleCm / CM_PER_INCH;           // pouces
      const moduleMils = moduleInch * 1000;                // mils
      // Mise à jour du slider mils si l’origine n’est pas "mils" (pour éviter boucle)
      if (!linkGuard && origin !== 'mils') {
        linkGuard = true;
        milsRange.value = moduleMils.toFixed(1);
        milsValue.textContent = parseFloat(milsRange.value).toFixed(1);
        linkGuard = false;
      }

      // 6) Rendu CB2D : on rend à une échelle entière raisonnable puis on laisse le CSS
      //    mettre à l’échelle (nearest-neighbor) pour atteindre la taille FIXE.
      //    Oversampling léger pour garder des arêtes nettes.
      const baseScale = Math.max(1, Math.round(Math.min(pxPerModuleEff, 10))); // borne pour perf
      const renderDevPx = modules * baseScale;
      cb2dCanvas.width  = renderDevPx;
      cb2dCanvas.height = renderDevPx;

      const ctx = cb2dCanvas.getContext('2d');
      if (ctx && 'imageSmoothingEnabled' in ctx) ctx.imageSmoothingEnabled = false;
      ctx.fillStyle = '#fff'; ctx.fillRect(0,0,cb2dCanvas.width, cb2dCanvas.height);

      try {
        if (tooSmall) {
          // N’affiche pas un symbole illisible : message explicite
          ctx.fillStyle = '#d00';
          ctx.font = Math.round(14 * dpr) + 'px system-ui, sans-serif';
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText('Erreur : < 1 px/module', cb2dCanvas.width/2, cb2dCanvas.height/2);
        } else {
          bwipjs.toCanvas(cb2dCanvas, { bcid, text, scale: baseScale, padding: 0, backgroundcolor: 'FFFFFF', includetext: false });
        }
      } catch (err) {
        console.error('Rendu CB2D échoué :', err);
        ctx.fillStyle = '#d00';
        ctx.font = Math.round(14 * dpr) + 'px system-ui, sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('Erreur CB2D', cb2dCanvas.width/2, cb2dCanvas.height/2);
      }

      // 7) Rendu règle calibrée (centre fixe)
      renderRuler();

      // 8) Footer : N×N + mils
      footerEl.textContent = `Modules : ${modules}×${modules} — Module : ${moduleMils.toFixed(1)} mils`;
    }

    function renderRuler() {
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      const rect = rulerCanvas.getBoundingClientRect();
      rulerCanvas.width  = Math.floor(rect.width * dpr);
      rulerCanvas.height = Math.floor(rect.height * dpr);
      const ctx = rulerCanvas.getContext('2d');
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      const W = rect.width, H = rect.height;
      const ppcm = pxPerCm();
      const ppmm = ppcm / 10;

      // Fond
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, W, H);

      // Quadrillage mm
      for (let x = 0; x <= W + 0.5; x += ppmm) {
        const mm = Math.round(x / ppmm);
        ctx.beginPath();
        ctx.moveTo(Math.round(x)+0.5, 0);
        ctx.lineTo(Math.round(x)+0.5, H);
        ctx.strokeStyle = (mm % 10 === 0) ? '#cfd6df' : '#eceff4';
        ctx.lineWidth = (mm % 10 === 0) ? 1.0 : 0.5;
        ctx.stroke();
      }
      for (let y = 0; y <= H + 0.5; y += ppmm) {
        const mm = Math.round(y / ppmm);
        ctx.beginPath();
        ctx.moveTo(0, Math.round(y)+0.5);
        ctx.lineTo(W, Math.round(y)+0.5);
        ctx.strokeStyle = (mm % 10 === 0) ? '#cfd6df' : '#eceff4';
        ctx.lineWidth = (mm % 10 === 0) ? 1.0 : 0.5;
        ctx.stroke();
      }

      // Axes centraux
      ctx.strokeStyle = '#9aa7b4';
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(Math.round(W/2)+0.5, 0); ctx.lineTo(Math.round(W/2)+0.5, H);
      ctx.moveTo(0, Math.round(H/2)+0.5); ctx.lineTo(W, Math.round(H/2)+0.5);
      ctx.stroke();

      // Règle cm + ticks mm (haut & gauche)
      ctx.strokeStyle = '#202730';
      ctx.fillStyle = '#202730';
      ctx.lineWidth = 1;

      // Haut (X)
      for (let cm = 0, x = 0; x <= W + 0.001; cm++, x = cm * ppcm) {
        ctx.beginPath(); ctx.moveTo(Math.round(x)+0.5, 0); ctx.lineTo(Math.round(x)+0.5, 10); ctx.stroke();
        ctx.font = '10px system-ui, sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'top';
        ctx.fillText(cm + ' cm', Math.round(x), 12);
        for (let m = 1; m < 10; m++) {
          const xm = x + m * ppmm; if (xm > W) break;
          ctx.beginPath();
          ctx.moveTo(Math.round(xm)+0.5, 0);
          ctx.lineTo(Math.round(xm)+0.5, m % 5 === 0 ? 8 : 5);
          ctx.stroke();
        }
      }

      // Gauche (Y)
      for (let cm = 0, y = 0; y <= H + 0.001; cm++, y = cm * ppcm) {
        ctx.beginPath(); ctx.moveTo(0, Math.round(y)+0.5); ctx.lineTo(10, Math.round(y)+0.5); ctx.stroke();
        ctx.font = '10px system-ui, sans-serif';
        ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
        ctx.fillText(cm + ' cm', 12, Math.round(y));
        for (let m = 1; m < 10; m++) {
          const ym = y + m * ppmm; if (ym > H) break;
          ctx.beginPath();
          ctx.moveTo(0, Math.round(ym)+0.5);
          ctx.lineTo(m % 5 === 0 ? 8 : 5, Math.round(ym)+0.5);
          ctx.stroke();
        }
      }
    }

    // ==== Gestion sliders & calibrage ====
    sizeRange.addEventListener('input', () => renderAll('cm'));

    milsRange.addEventListener('input', () => {
      if (linkGuard) return;
      linkGuard = true;
      // Quand l’utilisateur ajuste mils/module, on recalcule la taille CB2D (cm) à modules constants
      const milsTarget = Number(milsRange.value);
      milsValue.textContent = milsTarget.toFixed(1);

      // On a besoin du nombre de modules courant → reconstruire vite
      const bcid = 'azteccode';
      const text = buildPayload(Number(bytesRange.value));
      const modules = measureModules(bcid, text) || 1;

      const inchesPerModule = milsTarget / 1000;
      const cmPerModule = inchesPerModule * CM_PER_INCH;
      const sizeCm = cmPerModule * modules;
      const clamped = Math.min(5, Math.max(1, sizeCm));
      sizeRange.value = clamped.toFixed(1);
      sizeValue.textContent = clamped.toFixed(1);
      linkGuard = false;

      renderAll('mils');
    });

    bytesRange.addEventListener('input', () => {
      bytesValue.textContent = bytesRange.value;
      // Le changement de volume modifie les modules → la taille reste FIXE (cm),
      // et le slider mils/module est mis à jour par renderAll().
      renderAll('data');
    });

    calRange.addEventListener('input', () => {
      const v = parseFloat(calRange.value);
      setCalFactor(v);
      updateCalBar();
      renderAll('cal'); // réapplique partout
    });
    calReset.addEventListener('click', () => {
      setCalFactor(1.0);
      updateCalBar();
      renderAll('cal');
    });

    // Init + rotation
    (function init() {
      const cal = getCalFactor();
      calRange.value = String(cal.toFixed(3));
      calValue.textContent = cal.toFixed(3);
      updateCalBar();

      renderAll('init');

      window.addEventListener('resize', () => {
        clearTimeout(window.__rRt);
        window.__rRt = setTimeout(() => {
          basePxPerCm = measureBasePxPerCm();
          renderAll('resize');
        }, 120);
      });
    })();
  </script>
</body>
</html>
