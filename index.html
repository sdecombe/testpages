<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>CB2D (Aztec) – taille réglable, module en mils, volume de données</title>

  <style>
    :root {
      color-scheme: light dark;
      --bg: #f3f4f6;
      --fg: #111;
      --code-size-cm: 3; /* taille cible du CB2D (1–5 cm), hors marge */
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f1115;
        --fg: #e8e8e8;
      }
    }

    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", sans-serif;
    }

    /* Conteneur principal */
    .page {
      min-height: 100%;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: env(safe-area-inset-top, 12px) 16px env(safe-area-inset-bottom, 16px);
      box-sizing: border-box;
      gap: 10px;
    }

    /* Fond blanc sur la moitié supérieure */
    .page::before {
      content: "";
      position: absolute;
      inset: 0 0 50% 0;   /* haut : 0, bas : 50% => moitié supérieure */
      background: #ffffff;
      z-index: 0;
    }

    /* Couche de contenu */
    .content {
      position: relative;
      z-index: 1;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    /* Contrôles (haut) : taille du CB2D */
    .controls-top {
      width: 100%;
      max-width: 560px;
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
      margin-top: 2px;
      flex-wrap: wrap;
    }
    .controls-top label {
      font-size: 0.95rem;
      opacity: 0.9;
    }
    .controls-top input[type="range"] {
      width: min(70vw, 360px);
    }
    .size-readout {
      min-width: 5.5ch;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    /* Zone CB2D (en haut), sans marge autour du symbole */
    .code-area {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-top: 2px;
    }
    .code-box {
      /* Pas de padding ni arrière-plan : la taille = symbole uniquement */
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-sizing: content-box;
      /* largeur/hauteur seront fixées en JS pour coller au pas de module */
    }
    canvas#cb2d {
      display: block;
      /* largeur/hauteur CSS sont pilotées en JS pour correspondre au rendu device */
      image-rendering: pixelated; /* garde des arêtes nettes si mise à l’échelle CSS */
      background: #ffffff;  /* fond du symbole */
    }

    /* Quadrillage / règle au milieu de page */
    .ruler-area {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 8px 0;
    }
    .ruler-wrap {
      width: 8cm;
      height: 4cm;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 3px 12px rgba(0,0,0,0.08) inset, 0 2px 10px rgba(0,0,0,0.06);
      position: relative;
      overflow: hidden;
    }
    .ruler-title {
      position: absolute;
      top: 6px;
      left: 10px;
      font-size: 0.8rem;
      opacity: 0.7;
      user-select: none;
      pointer-events: none;
    }
    canvas#ruler {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Contrôle (bas) : volume de données */
    .controls-bottom {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 560px;
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      padding-top: 4px;
    }
    .controls-bottom label {
      font-size: 0.95rem;
      opacity: 0.9;
    }
    .controls-bottom input[type="range"] {
      width: min(70vw, 360px);
    }
    .bytes-readout {
      min-width: 7ch;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    /* Pied de page : affiche la taille d’un module en mils */
    footer {
      position: relative;
      z-index: 1;
      width: 100%;
      text-align: center;
      font-size: 0.95rem;
      line-height: 1.35;
      opacity: 0.95;
      padding-top: 2px;
    }

    :focus-visible {
      outline: 2px solid #4c9ffe;
      outline-offset: 2px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="content">
      <!-- Contrôle haut : taille du CB2D -->
      <div class="controls-top" aria-label="Réglage de la taille du CB2D">
        <label for="sizeRange">Taille du CB2D :</label>
        <input id="sizeRange" type="range" min="1" max="5" step="0.1" value="3" />
        <span class="size-readout"><span id="sizeValue">3.0</span> cm</span>
      </div>

      <!-- Symbole CB2D (en haut) -->
      <section class="code-area" aria-label="Zone du CB2D (Aztec)">
        <div class="code-box" id="code-box">
          <canvas id="cb2d"></canvas>
        </div>
      </section>

      <!-- Quadrillage / règle (milieu de page) -->
      <section class="ruler-area" aria-label="Quadrillage et règle">
        <div class="ruler-wrap">
          <div class="ruler-title">Quadrillage / règle (mm & cm)</div>
          <canvas id="ruler"></canvas>
        </div>
      </section>

      <!-- Contrôle bas : volume de données -->
      <div class="controls-bottom" aria-label="Réglage du volume de données du CB2D">
        <label for="bytesRange">Volume de données :</label>
        <input id="bytesRange" type="range" min="10" max="512" step="1" value="64" />
        <span class="bytes-readout"><span id="bytesValue">64</span> octets</span>
      </div>
    </div>

    <!-- Pied de page : taille de module en mils -->
    <footer id="footer-text">Module : — mils</footer>
  </main>

  <!-- bwip-js (génération CB2D/Aztec) -->
  <script src="https://unpkg.com/bwip-js/dist/bwip-js-min.js"></script>

  <script>
    /**
     * Paramètres initiaux
     * - compact : true => CB2D compact (capacité réduite, symbole plus petit)
     * - eclevel : pour Aztec, on peut forcer un pourcentage si besoin (optionnel)
     */
    const settings = {
      content: "CB2D_CONTENT_PLACEHOLDER",
      compact: false
      // eclevel: '23' // exemple : 23% si vous voulez forcer (optionnel)
    };

    // Éléments UI
    const sizeRange  = document.getElementById('sizeRange');
    const sizeValue  = document.getElementById('sizeValue');
    const bytesRange = document.getElementById('bytesRange');
    const bytesValue = document.getElementById('bytesValue');
    const footerEl   = document.getElementById('footer-text');

    // Canvases / conteneurs
    const canvas = document.getElementById('cb2d');
    const codeBox = document.getElementById('code-box');

    // Règle (quadrillage)
    const rulerCanvas = document.getElementById('ruler');

    // Génère un payload de N octets (ASCII visibles, 1 octet par caractère)
    function buildPayload(n) {
      // ASCII 33..126 (94 caractères), cyclés
      let s = '';
      for (let i = 0; i < n; i++) {
        s += String.fromCharCode(33 + (i % 94));
      }
      return s;
    }

    // Mesure le nombre de modules (carrés) du CB2D en rendant à scale=1 (pas de marge)
    function measureModulesCount(bcid, text) {
      // Canvas temporaire suffisamment grand
      const tmp = document.createElement('canvas');
      tmp.width = 600;  // suffisant pour CB2D jusqu’aux grandes tailles
      tmp.height = 600;
      const tctx = tmp.getContext('2d', { willReadFrequently: true });
      // Fond blanc
      tctx.fillStyle = '#fff';
      tctx.fillRect(0, 0, tmp.width, tmp.height);

      try {
        bwipjs.toCanvas(tmp, {
          bcid,
          text,
          scale: 1,         // 1 pixel par module
          padding: 0,       // aucune marge
          backgroundcolor: 'FFFFFF',
          includetext: false
        });
      } catch (e) {
        console.error('Erreur mesure modules (rendu scale=1) :', e);
        return null;
      }

      const img = tctx.getImageData(0, 0, tmp.width, tmp.height).data;

      // Recherche de la bounding-box non-blanche (luminance < 250) pour trouver le symbole
      const isWhite = (r,g,b) => (r + g + b) >= (250 * 3);

      let minX = tmp.width, minY = tmp.height, maxX = -1, maxY = -1;
      for (let y = 0; y < tmp.height; y++) {
        for (let x = 0; x < tmp.width; x++) {
          const idx = (y * tmp.width + x) * 4;
          const r = img[idx], g = img[idx+1], b = img[idx+2];
          if (!isWhite(r,g,b)) {
            if (x < minX) minX = x;
            if (y < minY) minY = y;
            if (x > maxX) maxX = x;
            if (y > maxY) maxY = y;
          }
        }
      }

      if (maxX < 0 || maxY < 0) {
        // rien trouvé
        return null;
      }

      const widthPx  = maxX - minX + 1;
      const heightPx = maxY - minY + 1;
      // Le symbole est carré : prendre le max par sécurité
      return Math.max(widthPx, heightPx); // à scale=1 => = nombre de modules
    }

    // Mesure px CSS par cm (pour convertir cm → px, puis px → pouces → mils)
    function measurePxPerCm() {
      const probe = document.createElement('div');
      probe.style.position = 'absolute';
      probe.style.left = '-9999px';
      probe.style.top = '-9999px';
      probe.style.width = '1cm';
      probe.style.height = '1cm';
      document.body.appendChild(probe);
      const rect = probe.getBoundingClientRect();
      document.body.removeChild(probe);
      return rect.width; // px CSS pour 1 cm
    }

    // Rendu CB2D principal
    function renderCB2D() {
      const desiredCm = Number(sizeRange.value);
      sizeValue.textContent = desiredCm.toFixed(1);

      // Détermine contenu à partir du slider "octets"
      const bytes = Number(bytesRange.value);
      bytesValue.textContent = bytes;
      const text = buildPayload(bytes);

      // Choix du type CB2D (compact / normal)
      const bcid = settings.compact ? 'azteccodecompact' : 'azteccode';

      // 1) Mesurer le nombre de modules à scale=1
      const modules = measureModulesCount(bcid, text);
      if (!modules || modules <= 0) {
        console.warn('Impossible de mesurer les modules, tentative avec valeur par défaut...');
      }

      // 2) Conversion cm -> px CSS, puis calcul du scale (px device / module)
      const pxPerCm = measurePxPerCm();
      const targetCssPx = desiredCm * pxPerCm;

      const dpr = Math.max(1, window.devicePixelRatio || 1);
      let scale = 1; // px device par module
      if (modules && modules > 0) {
        scale = Math.max(1, Math.floor((targetCssPx * dpr) / modules));
      }

      // 3) Taille device finale (au pixel près) et ajustement CSS exact
      const deviceSizePx = modules ? modules * scale : Math.floor(targetCssPx * dpr);
      const actualCssPx  = deviceSizePx / dpr;

      // Fixe la taille CSS exacte du symbole pour éviter tout flou
      codeBox.style.width  = actualCssPx + 'px';
      codeBox.style.height = actualCssPx + 'px';

      // Prépare le canvas en pixels device
      canvas.width  = deviceSizePx;
      canvas.height = deviceSizePx;
      canvas.style.width  = actualCssPx + 'px';
      canvas.style.height = actualCssPx + 'px';

      const ctx = canvas.getContext('2d');
      if (ctx && 'imageSmoothingEnabled' in ctx) {
        ctx.imageSmoothingEnabled = false;
      }
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // 4) Rendu CB2D définitif
      try {
        bwipjs.toCanvas(canvas, {
          bcid,
          text,
          scale: scale,
          padding: 0,
          backgroundcolor: 'FFFFFF',
          includetext: false
          // eclevel: settings.eclevel // si vous souhaitez imposer un taux de redondance
        });
      } catch (err) {
        console.error('Erreur rendu CB2D :', err);
        ctx.fillStyle = '#d00';
        ctx.font = Math.round(14 * (window.devicePixelRatio||1)) + 'px system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('Erreur CB2D', canvas.width/2, canvas.height/2);
      }

      // 5) Calcul de la taille d’un module en mils et affichage en bas de page
      //    moduleCssPx = (pixels device / dpr) par module = scale / dpr
      const moduleCssPx = scale / dpr;
      const moduleCm = moduleCssPx / pxPerCm;
      const moduleInches = moduleCm / 2.54;
      const moduleMils = moduleInches * 1000;
      footerEl.textContent = 'Module : ' + moduleMils.toFixed(1) + ' mils';
    }

    // Quadrillage / Règle
    function renderRuler() {
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      const rect = rulerCanvas.getBoundingClientRect();
      rulerCanvas.width  = Math.floor(rect.width * dpr);
      rulerCanvas.height = Math.floor(rect.height * dpr);
      const ctx = rulerCanvas.getContext('2d');
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      const W = rect.width, H = rect.height;

      const pxPerCm = measurePxPerCm();
      const pxPerMm = pxPerCm / 10;

      // Fond
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, W, H);

      // Quadrillage mm
      for (let x = 0; x <= W + 0.5; x += pxPerMm) {
        ctx.beginPath();
        ctx.moveTo(Math.round(x) + 0.5, 0);
        ctx.lineTo(Math.round(x) + 0.5, H);
        const mmIndex = Math.round(x / pxPerMm);
        ctx.strokeStyle = (mmIndex % 10 === 0) ? '#d0d6e0' : '#eceff4';
        ctx.lineWidth = (mmIndex % 10 === 0) ? 1.0 : 0.5;
        ctx.stroke();
      }
      for (let y = 0; y <= H + 0.5; y += pxPerMm) {
        ctx.beginPath();
        ctx.moveTo(0, Math.round(y) + 0.5);
        ctx.lineTo(W, Math.round(y) + 0.5);
        const mmIndex = Math.round(y / pxPerMm);
        ctx.strokeStyle = (mmIndex % 10 === 0) ? '#d0d6e0' : '#eceff4';
        ctx.lineWidth = (mmIndex % 10 === 0) ? 1.0 : 0.5;
        ctx.stroke();
      }

      // Axes centraux
      ctx.strokeStyle = '#9aa7b4';
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(Math.round(W/2)+0.5, 0); ctx.lineTo(Math.round(W/2)+0.5, H);
      ctx.moveTo(0, Math.round(H/2)+0.5); ctx.lineTo(W, Math.round(H/2)+0.5);
      ctx.stroke();

      // Règle cm (haut et gauche) avec ticks mm
      ctx.strokeStyle = '#202730';
      ctx.fillStyle = '#202730';
      ctx.lineWidth = 1;

      // Ticks en haut (X)
      for (let cm = 0, x = 0; x <= W + 0.001; cm++, x = cm * pxPerCm) {
        ctx.beginPath(); ctx.moveTo(Math.round(x)+0.5, 0); ctx.lineTo(Math.round(x)+0.5, 10); ctx.stroke();
        ctx.font = '10px system-ui, sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'top';
        ctx.fillText(cm + ' cm', Math.round(x), 12);
        for (let m = 1; m < 10; m++) {
          const xm = x + m * (pxPerCm/10); if (xm > W) break;
          ctx.beginPath();
          ctx.moveTo(Math.round(xm)+0.5, 0);
          ctx.lineTo(Math.round(xm)+0.5, m % 5 === 0 ? 8 : 5);
          ctx.stroke();
        }
      }

      // Ticks à gauche (Y)
      for (let cm = 0, y = 0; y <= H + 0.001; cm++, y = cm * pxPerCm) {
        ctx.beginPath(); ctx.moveTo(0, Math.round(y)+0.5); ctx.lineTo(10, Math.round(y)+0.5); ctx.stroke();
        ctx.font = '10px system-ui, sans-serif';
        ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
        ctx.fillText(cm + ' cm', 12, Math.round(y));
        for (let m = 1; m < 10; m++) {
          const ym = y + m * (pxPerCm/10); if (ym > H) break;
          ctx.beginPath();
          ctx.moveTo(0, Math.round(ym)+0.5);
          ctx.lineTo(m % 5 === 0 ? 8 : 5, Math.round(ym)+0.5);
          ctx.stroke();
        }
      }
    }

    // Handlers sliders
    sizeRange.addEventListener('input', () => { renderCB2D(); });
    bytesRange.addEventListener('input', () => { renderCB2D(); });

    // Rendus initiaux + sur resize/rotation
    function renderAll() {
      renderCB2D();
      renderRuler();
    }
    renderAll();
    window.addEventListener('resize', () => {
      clearTimeout(window.__reflowTimer);
      window.__reflowTimer = setTimeout(renderAll, 120);
    });
  </script>
</body>
</html>
